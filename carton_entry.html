<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📦 কার্টন এন্ট্রি (Firebase Live)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; padding: 20px 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
        .header h1 { font-size: 22px; }
        .live-badge {
            background: #28a745 !important;
            color: white;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-left: 10px;
        }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        .live-message {
            background: #e8f5e9;
            color: #1b5e20;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            border-left: 5px solid #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .card h2 { color: #0d47a1; margin-bottom: 15px; border-bottom: 2px solid #1976d2; padding-bottom: 8px; font-size: 18px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 600; font-size: 13px; color: #333; margin-bottom: 4px; }
        .form-group input, .form-group select { padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { border-color: #1976d2; outline: none; box-shadow: 0 0 0 2px rgba(25,118,210,0.2); }
        .form-group .readonly { background: #f5f5f5; color: #333; cursor: not-allowed; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #1e7e34; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #bd2130; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        .btn-sm { padding: 4px 12px; font-size: 12px; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; }
        .btn-sm-primary { background: #1976d2; color: white; }
        .btn-sm-primary:hover { background: #0d47a1; }
        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #e3eef9; color: #0d47a1; padding: 10px 8px; border-bottom: 2px solid #1976d2; white-space: nowrap; text-align: center; }
        td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover { background: #f5f9ff; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-mc { background: #d4edda; color: #155724; }
        .badge-pack { background: #fff3cd; color: #856404; }
        .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .empty-msg { text-align: center; color: #888; padding: 20px; font-style: italic; }
        .util-pct { font-size: 12px; color: #0d47a1; font-weight: 600; display: block; margin-top: 2px; }
        .alert-box { background: #fff3cd; border-left: 6px solid #ffc107; padding: 12px 18px; border-radius: 6px; margin-bottom: 15px; color: #856404; font-weight: 500; display: none; }
        .alert-box.show { display: block; }
        .output-update-form {
            display: none;
            background: #e8f0fe;
            padding: 12px 15px;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid #1976d2;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .output-update-form.show { display: flex; }
        .output-update-form .form-group { min-width: 140px; flex: 1; }
        .output-update-form .form-group input { padding: 6px 10px; }
        .output-update-form .btn { padding: 6px 18px; font-size: 13px; margin-top: 0; }
        .live-clock {
            text-align: center;
            padding: 20px 10px;
            margin-top: 25px;
            background: #1a1a2e;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #e53935;
        }
        .live-clock .clock-label { font-size: 18px; color: #ffb74d; font-weight: 600; letter-spacing: 2px; margin-bottom: 6px; }
        .live-clock .clock-time {
            font-size: 48px; font-weight: 700; color: #ff1744; text-shadow: 0 0 20px rgba(255, 23, 68, 0.6);
            font-family: 'Courier New', monospace; letter-spacing: 4px; background: #0d0d1a; padding: 10px 20px; border-radius: 8px;
            display: inline-block; border: 1px solid #e53935;
        }
        .live-clock .clock-time .seconds { font-size: 32px; color: #ff6f00; }
        .live-clock .clock-date { font-size: 18px; color: #ffb74d; margin-top: 8px; font-weight: 500; }
        @media (max-width: 600px) {
            .live-clock .clock-time { font-size: 32px; padding: 6px 12px; }
            .live-clock .clock-time .seconds { font-size: 22px; }
        }
        .nav-links { display: flex; gap: 20px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        .nav-links a { color: #1976d2; text-decoration: none; font-weight: 600; }
        .nav-links a:hover { text-decoration: underline; }
        .nav-links .report-link {
            background: #28a745;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 700;
        }
        .nav-links .report-link:hover {
            background: #1e7e34;
            text-decoration: none;
        }
        .btn-danger-lg {
            background: #dc3545;
            color: white;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-danger-lg:hover { background: #bd2130; transform: scale(1.02); }

        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-box h3 { font-size: 22px; color: #0d47a1; border-bottom: 2px solid #1976d2; padding-bottom: 10px; margin-bottom: 16px; }
        .modal-box .form-group { margin-bottom: 14px; }
        .modal-box .form-group label { display: block; font-weight: 600; font-size: 14px; color: #333; margin-bottom: 4px; }
        .modal-box .form-group input, .modal-box .form-group textarea {
            width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .modal-box .form-group input:focus { border-color: #1976d2; outline: none; box-shadow: 0 0 0 3px rgba(25,118,210,0.1); }
        .modal-box .btn-group { display: flex; gap: 12px; margin-top: 18px; }
        .modal-box .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .modal-box .btn-group .btn-save { background: #28a745; color: white; }
        .modal-box .btn-group .btn-save:hover { background: #1e7e34; }
        .modal-box .btn-group .btn-cancel { background: #6c757d; color: white; }
        .modal-box .btn-group .btn-cancel:hover { background: #5a6268; }
        .modal-box .readonly-field {
            background: #f5f5f5; color: #333; padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- হেডার -->
    <div class="header">
        <h1>📦 কার্টন এন্ট্রি <span class="live-badge">🟢 লাইভ</span></h1>
        <span>📅 <span id="currentDate"></span></span>
    </div>

    <!-- বাংলা বার্তা -->
    <div class="live-message">
        📢 আপনার তথ্য RFL গ্রুপের সবাই লাইভ দেখতে পারবেন
    </div>

    <div id="alertMessage" class="alert-box"></div>

    <div class="card">
        <h2>➕ নতুন এন্ট্রি</h2>
        <div class="form-grid" id="entryForm">
            <div class="form-group">
                <label>📅 তারিখ (Entry Date)</label>
                <input type="date" id="entryDate" value="">
            </div>
            <div class="form-group">
                <label>🏢 ডিপার্টমেন্ট</label>
                <select id="deptSelect" onchange="updateProdIC()">
                    <option value="">-- সিলেক্ট করুন --</option>
                </select>
            </div>
            <div class="form-group">
                <label>👨‍💼 Prod IC (Fixed)</label>
                <input type="text" id="prodIC" class="readonly" readonly>
            </div>
            <div class="form-group">
                <label>🕒 শিফট</label>
                <select id="shiftSelect">
                    <option value="Day">ডে (Day)</option>
                    <option value="Night">নাইট (Night)</option>
                </select>
            </div>
            <div class="form-group">
                <label>🧑‍💼 IC Name (Data Entry)</label>
                <input type="text" id="icName" placeholder="ইনচার্জের নাম">
            </div>
            <div class="form-group">
                <label>⏳ Input HR (ম্যানুয়াল)</label>
                <input type="number" id="dayHr" placeholder="যেমন 10" step="0.5" min="0" oninput="calculateTargetAndUtil()">
            </div>
            <div class="form-group">
                <label>🎯 Carton Target (অটো)</label>
                <input type="number" id="cartonTarget" class="readonly" readonly value="0">
            </div>
            <div class="form-group">
                <label>📦 CTN Output (ম্যানুয়াল)</label>
                <input type="number" id="ctnOutput" placeholder="যেমন 400" step="1" min="0" oninput="calculatePerHrAndUtil()">
            </div>
            <div class="form-group">
                <label>📊 Per HR CTN (অটো)</label>
                <input type="number" id="perHrCtn" class="readonly" readonly value="0">
                <span id="utilDisplay" class="util-pct">Utilisation: 0%</span>
            </div>
            <div class="form-group" style="justify-content: flex-end;">
                <button class="btn btn-success" onclick="addEntry()">➕ এন্ট্রি যোগ করুন</button>
            </div>
        </div>
    </div>

    <!-- অ্যাকশন বার — সব ডেটা মুছুন (পাসওয়ার্ড সুরক্ষিত) -->
    <div class="action-bar">
        <button class="btn btn-warning" onclick="exportCSV()">⬇️ CSV ডাউনলোড</button>
        <button class="btn btn-danger-lg" onclick="clearAll()">🗑️ সব ডেটা মুছুন</button>
    </div>

    <!-- এন্ট্রি লগ -->
    <div class="card">
        <h2>📋 এন্ট্রি লগ (লাইভ)</h2>
        <div id="entryLogContainer"><div class="empty-msg">লোড হচ্ছে...</div></div>
    </div>

    <div class="live-clock">
        <div class="clock-label">🇧🇩 বাংলাদেশ সময়</div>
        <div class="clock-time" id="bdClock">
            <span id="clockHours">00</span>:<span id="clockMinutes">00</span>:<span id="clockSeconds" class="seconds">00</span>
        </div>
        <div class="clock-date" id="clockDate">শনিবার, ০১ জানুয়ারি ২০২৬</div>
    </div>

    <!-- নেভিগেশন লিংক — এখানে রিপোর্ট লিংক যুক্ত -->
    <div class="nav-links">
        <a href="carton_report.html" class="report-link">📊 রিপোর্ট দেখুন</a>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <h3>✏️ এন্ট্রি সম্পাদনা করুন</h3>
        <input type="hidden" id="editKey">
        <div class="form-group">
            <label>ডিপার্টমেন্ট</label>
            <div class="readonly-field" id="editDept"></div>
        </div>
        <div class="form-group">
            <label>শিফট</label>
            <div class="readonly-field" id="editShift"></div>
        </div>
        <div class="form-group">
            <label>IC Name</label>
            <div class="readonly-field" id="editIC"></div>
        </div>
        <div class="form-group">
            <label>Day HR</label>
            <input type="number" id="editDayHr" step="0.5" min="0">
        </div>
        <div class="form-group">
            <label>CTN Output</label>
            <input type="number" id="editOutput" step="1" min="0">
        </div>
        <div class="form-group">
            <label>Cause (কারণ)</label>
            <input type="text" id="editCause" placeholder="কারণ লিখুন">
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="saveEdit()">💾 সংরক্ষণ</button>
            <button class="btn-cancel" onclick="closeEditModal()">বাতিল</button>
        </div>
    </div>
</div>

<!-- Firebase Import Map & Script -->
<script type="importmap">
    {
        "imports": {
            "firebase-app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase-database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase-app";
    import { getDatabase, ref, push, onValue, update, remove } from "firebase-database";

    const firebaseConfig = {
        apiKey: "AIzaSyAHMH9uGLQfXsCppY1xwbY91wbMcOMUUE",
        authDomain: "carton-management.firebaseapp.com",
        databaseURL: "https://carton-management-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "carton-management",
        storageBucket: "carton-management.firebasestorage.app",
        messagingSenderId: "610163022584",
        appId: "1:610163022584:web:04c1a715b5e66aa2f6390d",
        measurementId: "G-ZFZNK5Q4V"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const cartonRef = ref(database, 'cartonEntries');

    // ===== কনফিগারেশন =====
    const PER_HR_CAPACITY = 40;
    const DEPARTMENTS = [
        { id: 'mc1', name: 'RIP> DPL> Plastic-1', type: 'MC', prodIC: 'Mr. Atiqur' },
        { id: 'mc2', name: 'RIP> DPL> Plastic-3', type: 'MC', prodIC: 'Mr. Shawon' },
        { id: 'mc3', name: 'RIP> DPL> Plastic-6.1', type: 'MC', prodIC: 'Mr. Hazrat' },
        { id: 'mc4', name: 'RIP> DPL> Plastic-6.2', type: 'MC', prodIC: 'Mr. Polash' },
        { id: 'mc5', name: 'RIP> DPL> Plastic-7.1', type: 'MC', prodIC: 'Mr. Monir' },
        { id: 'mc6', name: 'RIP> DPL> Plastic-7.2', type: 'MC', prodIC: 'Mr. Sayem' },
        { id: 'mc7', name: 'RIP> DPL> Plastic-7.3', type: 'MC', prodIC: 'Mr. Saddam' },
        { id: 'mc8', name: 'RIP> DPL> Plastic-7.4', type: 'MC', prodIC: 'Mr. Awal' },
        { id: 'p1', name: 'Plastic Packaging-01', type: 'Packaging', prodIC: 'Mr. Mahbub' },
        { id: 'p2', name: 'Plastic Packaging-02', type: 'Packaging', prodIC: 'Mr. Rakib' },
        { id: 'p3', name: 'Plastic Packaging-03', type: 'Packaging', prodIC: 'Mr. Mahbub' }
    ];
    const DEPT_NAME_TO_IC = {};
    DEPARTMENTS.forEach(d => { DEPT_NAME_TO_IC[d.name] = d.prodIC; });

    let allEntries = [];
    const alertBox = document.getElementById('alertMessage');
    const entryLogContainer = document.getElementById('entryLogContainer');

    // ===== UI ফাংশন =====
    window.populateDeptDropdown = function() {
        const select = document.getElementById('deptSelect');
        select.innerHTML = '<option value="">-- সিলেক্ট করুন --</option>';
        DEPARTMENTS.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.name;
            opt.textContent = d.name;
            opt.dataset.type = d.type;
            select.appendChild(opt);
        });
    };

    window.updateProdIC = function() {
        const dept = document.getElementById('deptSelect').value;
        const icInput = document.getElementById('prodIC');
        icInput.value = (dept && DEPT_NAME_TO_IC[dept]) ? DEPT_NAME_TO_IC[dept] : '';
        calculateTargetAndUtil();
        calculatePerHrAndUtil();
    };

    window.calculateTargetAndUtil = function() {
        const dayHr = parseFloat(document.getElementById('dayHr').value) || 0;
        const target = dayHr * PER_HR_CAPACITY;
        document.getElementById('cartonTarget').value = target.toFixed(0);
        calculatePerHrAndUtil();
    };

    window.calculatePerHrAndUtil = function() {
        const dayHr = parseFloat(document.getElementById('dayHr').value) || 0;
        const output = parseFloat(document.getElementById('ctnOutput').value) || 0;
        const perHr = dayHr > 0 ? output / dayHr : 0;
        document.getElementById('perHrCtn').value = perHr.toFixed(2);
        const utilPct = PER_HR_CAPACITY > 0 ? (perHr / PER_HR_CAPACITY) * 100 : 0;
        document.getElementById('utilDisplay').innerHTML = `Utilisation: ${utilPct.toFixed(1)}%`;
    };

    // ===== ভয়েস =====
    function getFemaleVoice() {
        const voices = window.speechSynthesis.getVoices();
        for (let v of voices) {
            if (v.lang.startsWith('bn') && v.name.toLowerCase().includes('female')) return v;
        }
        for (let v of voices) { if (v.lang.startsWith('bn')) return v; }
        for (let v of voices) { if (v.name.toLowerCase().includes('female')) return v; }
        return null;
    }

    function speakText(text, pitch = 1.2, rate = 0.85) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'bn-BD';
        msg.rate = rate;
        msg.pitch = pitch;
        msg.volume = 1;
        const voice = getFemaleVoice();
        if (voice) msg.voice = voice;
        if (window.speechSynthesis.getVoices().length === 0) {
            window.speechSynthesis.onvoiceschanged = function() {
                const v2 = getFemaleVoice();
                if (v2) msg.voice = v2;
                window.speechSynthesis.speak(msg);
            };
        } else {
            window.speechSynthesis.speak(msg);
        }
    }

    function speakAlert(alertText) { speakText(alertText, 1.1, 0.85); }
    function speakSuccess() {
        const msg = 'আপনার তথ্য সঠিকভাবে জমা হয়েছে। আপনি যদি এন্ট্রি দেওয়ার সময় কোনো ভুল করে থাকেন, তাহলে দ্রুত সাইফুদ্দিন অথবা সায়েম ভাইয়ের সাথে যোগাযোগ করুন। তারা রিপোর্টটি সংশোধন করতে সাহায্য করবেন।';
        speakText(msg, 1.2, 0.85);
    }

    // ===== Firebase এন্ট্রি যোগ =====
    window.addEntry = async function() {
        alertBox.classList.remove('show');
        alertBox.innerText = '';
        alertBox.style.borderLeftColor = '#ffc107';
        alertBox.style.background = '#fff3cd';
        alertBox.style.color = '#856404';

        const dept = document.getElementById('deptSelect').value;
        const prodIC = document.getElementById('prodIC').value;
        const shift = document.getElementById('shiftSelect').value;
        const icName = document.getElementById('icName').value.trim() || '-';
        const dayHr = parseFloat(document.getElementById('dayHr').value) || 0;
        const target = parseFloat(document.getElementById('cartonTarget').value) || 0;
        const output = parseFloat(document.getElementById('ctnOutput').value) || 0;
        const perHr = parseFloat(document.getElementById('perHrCtn').value) || 0;
        const utilPct = PER_HR_CAPACITY > 0 ? (perHr / PER_HR_CAPACITY) * 100 : 0;
        const entryDate = document.getElementById('entryDate').value;

        if (!entryDate) { alert('দয়া করে একটি তারিখ নির্বাচন করুন!'); return; }
        if (!dept) { alert('দয়া করে ডিপার্টমেন্ট সিলেক্ট করুন!'); return; }
        if (dayHr <= 0) { alert('Day HR অবশ্যই ০-এর বেশি হতে হবে!'); return; }

        const existingDayEntries = allEntries.filter(e =>
            e.entryDate === entryDate && e.shift === 'Day' && e.dept === dept
        );

        if (shift === 'Day') {
            if (existingDayEntries.length > 0) {
                const icNameExisting = existingDayEntries[0].icName;
                const alertMsg = `মিস্টার ${icNameExisting}  ${dept} ডিপার্টমেন্টের ${entryDate} তারিখে ইতিমধ্যে একটি Day Shift এন্ট্রি আছে! দয়া করে আগের এন্ট্রি ডিলিট করে নতুন করুন, অথবা শুধুমাত্র Night Shift দিন।`;
                alertBox.innerText = `⚠️ ${alertMsg}`;
                alertBox.classList.add('show');
                speakAlert(alertMsg);
                return;
            }
        }

        if (shift === 'Night') {
            if (existingDayEntries.length === 0) {
                const nameToUse = (icName !== '-') ? icName : prodIC;
                const alertMsg = `মিস্টার ${nameToUse}  ${dept} ডিপার্টমেন্টের ${entryDate} তারিখে কোনো Day Shift এন্ট্রি নেই! আগে Day Shift-এর পেকেজিং এর Cartoon Output সহ এন্ট্রি সম্পূর্ণ করুন তা না হলে রাতের সিফট এর এইচ আর বা আপনার অপারেটর ইনপুট দিতে পারবেন না!!!`;
                alertBox.innerText = `⚠️ ${alertMsg}`;
                alertBox.classList.add('show');
                speakAlert(alertMsg);
                return;
            }
            const dayEntry = existingDayEntries[0];
            if (!dayEntry.output || dayEntry.output === 0) {
                const icNameExisting = dayEntry.icName;
                const alertMsg = `মিস্টার ${icNameExisting}  ${dept} ডিপার্টমেন্টের ${entryDate} তারিখের Day Shift-এর পেকেজিং এর Cartoon Output (বর্তমানে ${dayEntry.output}) দেওয়া হয়নি! দয়া করে নিচের লগ টেবিলে গিয়ে "Output দিন" বাটনে ক্লিক করে Output আপডেট করুন, তারপর Night Shift দিন।`;
                alertBox.innerText = `⚠️ ${alertMsg}`;
                alertBox.classList.add('show');
                speakAlert(alertMsg);
                return;
            }
        }

        const newEntry = {
            dept, prodIC, shift, icName, dayHr, target, output, perHr, utilPct, entryDate,
            timestamp: new Date().toLocaleString('bn-BD')
        };

        try {
            await push(cartonRef, newEntry);
            document.getElementById('deptSelect').value = '';
            document.getElementById('prodIC').value = '';
            document.getElementById('icName').value = '';
            document.getElementById('dayHr').value = '';
            document.getElementById('cartonTarget').value = '0';
            document.getElementById('ctnOutput').value = '';
            document.getElementById('perHrCtn').value = '0';
            document.getElementById('utilDisplay').innerHTML = 'Utilisation: 0%';
            const today = new Date().toISOString().slice(0,10);
            document.getElementById('entryDate').value = today;
            autoSelectShift();
            updateProdIC();

            alertBox.style.borderLeftColor = '#28a745';
            alertBox.style.background = '#d4edda';
            alertBox.style.color = '#155724';
            alertBox.innerText = `✅ ${shift} Shift-এর এন্ট্রি সফলভাবে যোগ হয়েছে! (CTN: ${output})`;
            alertBox.classList.add('show');
            speakSuccess();

            setTimeout(() => {
                alertBox.classList.remove('show');
                alertBox.style.borderLeftColor = '#ffc107';
                alertBox.style.background = '#fff3cd';
                alertBox.style.color = '#856404';
            }, 5000);
        } catch (error) {
            alert('Firebase-এ সংরক্ষণ করতে সমস্যা: ' + error.message);
        }
    };

    // ===== ডিলিট =====
    window.deleteEntry = async function(key) {
        if (!confirm('এই এন্ট্রি মুছবেন?')) return;
        try {
            await remove(ref(database, `cartonEntries/${key}`));
        } catch (error) {
            alert('ডিলিট করতে সমস্যা: ' + error.message);
        }
    };

    // ===== Output Update (সকলের জন্য উন্মুক্ত) =====
    window.showOutputUpdateForm = function(key) {
        document.querySelectorAll('.output-update-form').forEach(el => el.classList.remove('show'));
        const form = document.getElementById(`edit-form-${key}`);
        if (form) {
            form.classList.toggle('show');
            const input = form.querySelector('input[type="number"]');
            if (input) setTimeout(() => input.focus(), 100);
        }
    };

    window.updateOutput = async function(key) {
        const input = document.getElementById(`edit-output-${key}`);
        const newOutput = parseFloat(input.value) || 0;
        if (newOutput < 0) { alert('Output ০ বা তার বেশি হতে হবে!'); return; }

        const entry = allEntries.find(e => e.key === key);
        if (!entry) { alert('এন্ট্রি পাওয়া যায়নি!'); return; }

        const dayHr = entry.dayHr || 0;
        const perHr = dayHr > 0 ? newOutput / dayHr : 0;
        const utilPct = PER_HR_CAPACITY > 0 ? (perHr / PER_HR_CAPACITY) * 100 : 0;

        try {
            await update(ref(database, `cartonEntries/${key}`), {
                output: newOutput,
                perHr: perHr,
                utilPct: utilPct
            });
            alertBox.style.borderLeftColor = '#28a745';
            alertBox.style.background = '#d4edda';
            alertBox.style.color = '#155724';
            alertBox.innerText = `✅ Output সফলভাবে আপডেট হয়েছে! নতুন Output: ${newOutput}`;
            alertBox.classList.add('show');
            setTimeout(() => alertBox.classList.remove('show'), 4000);
        } catch (error) {
            alert('আপডেট করতে সমস্যা: ' + error.message);
        }
    };

    // ===== এডিট ফাংশন (পাসওয়ার্ড সুরক্ষিত) =====
    let currentEditKey = null;

    window.editEntry = function(key) {
        // পাসওয়ার্ড চেক
        const password = prompt('🔒 সম্পূর্ণ এডিট করতে পাসওয়ার্ড দিন:');
        if (password === null) return;
        if (password !== 'arif123') {
            alert('❌ ভুল পাসওয়ার্ড!');
            return;
        }

        // এন্ট্রি খুঁজে বের করা
        const entry = allEntries.find(e => e.key === key);
        if (!entry) {
            alert('এন্ট্রি পাওয়া যায়নি!');
            return;
        }

        // মডাল পপুলেট
        currentEditKey = key;
        document.getElementById('editKey').value = key;
        document.getElementById('editDept').textContent = entry.dept || '';
        document.getElementById('editShift').textContent = entry.shift || '';
        document.getElementById('editIC').textContent = entry.icName || '';
        document.getElementById('editDayHr').value = entry.dayHr || 0;
        document.getElementById('editOutput').value = entry.output || 0;
        document.getElementById('editCause').value = entry.cause || '';

        document.getElementById('editModal').classList.add('show');
    };

    window.closeEditModal = function() {
        document.getElementById('editModal').classList.remove('show');
        currentEditKey = null;
    };

    window.saveEdit = async function() {
        const key = document.getElementById('editKey').value;
        const dayHr = parseFloat(document.getElementById('editDayHr').value) || 0;
        const output = parseFloat(document.getElementById('editOutput').value) || 0;
        const cause = document.getElementById('editCause').value.trim();

        if (dayHr < 0 || output < 0) {
            alert('Day HR ও Output ০ বা তার বেশি হতে হবে!');
            return;
        }

        // ক্যালকুলেশন
        const perHr = dayHr > 0 ? output / dayHr : 0;
        const utilPct = PER_HR_CAPACITY > 0 ? (perHr / PER_HR_CAPACITY) * 100 : 0;

        const updateData = {
            dayHr: dayHr,
            output: output,
            perHr: perHr,
            utilPct: utilPct,
            cause: cause
        };

        try {
            await update(ref(database, `cartonEntries/${key}`), updateData);
            alert('✅ এন্ট্রি সফলভাবে আপডেট করা হয়েছে!');
            closeEditModal();
            // লিস্ট রিফ্রেশ – onValue নিজেই আপডেট করবে
        } catch (error) {
            alert('❌ আপডেট করতে সমস্যা: ' + error.message);
        }
    };

    // ===== সব ডেটা মুছুন (পাসওয়ার্ড) =====
    window.clearAll = async function() {
        const password = prompt('🔒 সব ডেটা মুছতে পাসওয়ার্ড দিন:');
        if (password === null) return;
        if (password !== 'arif123') {
            alert('❌ ভুল পাসওয়ার্ড!');
            return;
        }
        if (!confirm('⚠️ সতর্কতা: সব ডেটা স্থায়ীভাবে মুছে ফেলা হবে। আপনি কি নিশ্চিত?')) return;
        try {
            await remove(cartonRef);
            alert('✅ সব ডেটা সফলভাবে মুছে ফেলা হয়েছে!');
        } catch (error) {
            alert('❌ সব ডেটা মুছতে সমস্যা: ' + error.message);
        }
    };

    // ===== CSV Export =====
    window.exportCSV = function() {
        if (allEntries.length === 0) { alert('কোনো ডেটা নেই!'); return; }
        const headers = ['Department', 'Prod IC', 'Shift', 'IC Name', 'Day HR', 'Target', 'CTN Output', 'Per HR CTN', 'Utilisation %', 'Entry Date', 'Timestamp'];
        let csv = headers.join(',') + '\n';
        allEntries.forEach(e => {
            const row = [
                `"${e.dept}"`, `"${e.prodIC}"`, `"${e.shift}"`, `"${e.icName}"`,
                e.dayHr, e.target, e.output, e.perHr, e.utilPct ? e.utilPct.toFixed(1) : '0',
                `"${e.entryDate}"`, `"${e.timestamp}"`
            ];
            csv += row.join(',') + '\n';
        });
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Carton_Entry_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    };

    window.autoSelectShift = function() {
        const now = new Date();
        const hours = now.getHours();
        const shift = (hours >= 8 && hours < 20) ? 'Day' : 'Night';
        const shiftSelect = document.getElementById('shiftSelect');
        if (shiftSelect) shiftSelect.value = shift;
        return shift;
    };

    // ===== এন্ট্রি লগ রেন্ডার (Output দিন + Edit বাটন) =====
    function renderLog() {
        if (allEntries.length === 0) {
            entryLogContainer.innerHTML = `<div class="empty-msg">📭 কোনো এন্ট্রি নেই</div>`;
            return;
        }

        let html = `<div class="table-wrap"><table>
            <thead><tr>
                <th>#</th><th>ডিপার্টমেন্ট</th><th>Prod IC</th><th>শিফট</th><th>IC Name</th>
                <th>Day HR</th><th>Target (CTN)</th><th>CTN Output</th><th>Per HR CTN</th>
                <th>Utilisation %</th><th>তারিখ</th><th>সময়</th>
                <th>অ্যাকশন</th>
            </tr></thead><tbody>`;

        allEntries.forEach((e, idx) => {
            const badgeClass = DEPARTMENTS.find(d => d.name === e.dept)?.type === 'MC' ? 'badge-mc' : 'badge-pack';
            const isDayWithZeroOutput = (e.shift === 'Day' && (e.output === 0 || !e.output));
            html += `<tr>
                <td>${idx + 1}</td>
                <td><span class="badge ${badgeClass}">${e.dept}</span></td>
                <td>${e.prodIC}</td>
                <td>${e.shift}</td>
                <td>${e.icName}</td>
                <td>${e.dayHr}</td>
                <td>${e.target}</td>
                <td>${e.output}</td>
                <td>${e.perHr}</td>
                <td>${e.utilPct ? e.utilPct.toFixed(1) + '%' : '0%'}</td>
                <td>${e.entryDate}</td>
                <td>${e.timestamp}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteEntry('${e.key}')">🗑️</button>
                    ${isDayWithZeroOutput ? ` <button class="btn btn-warning btn-sm" onclick="showOutputUpdateForm('${e.key}')">✏️ Output দিন</button>` : ''}
                    <button class="btn btn-sm btn-sm-primary" onclick="editEntry('${e.key}')" style="margin-left:4px;">✏️ Edit</button>
                </td>
            </tr>
            <tr id="edit-row-${e.key}" style="display: none;">
                <td colspan="13">
                    <div id="edit-form-${e.key}" class="output-update-form">
                        <div class="form-group">
                            <label>Day HR (Read Only)</label>
                            <input type="number" value="${e.dayHr}" readonly class="readonly">
                        </div>
                        <div class="form-group">
                            <label>📦 নতুন CTN Output</label>
                            <input type="number" id="edit-output-${e.key}" value="${e.output}" step="1" min="0" placeholder="Output দিন">
                        </div>
                        <button class="btn btn-success" onclick="updateOutput('${e.key}')">✅ আপডেট করুন</button>
                        <button class="btn btn-danger" onclick="document.getElementById('edit-form-${e.key}').classList.remove('show')">বাতিল</button>
                    </div>
                </td>
            </tr>`;
        });

        html += `</tbody></table></div>`;
        entryLogContainer.innerHTML = html;

        // Output Update ফর্মের টগল শো/হাইড
        document.querySelectorAll('.output-update-form').forEach(form => {
            const key = form.id.replace('edit-form-', '');
            const row = document.getElementById(`edit-row-${key}`);
            if (row) {
                const observer = new MutationObserver(() => {
                    if (form.classList.contains('show')) {
                        row.style.display = 'table-row';
                    } else {
                        row.style.display = 'none';
                    }
                });
                observer.observe(form, { attributes: true, attributeFilter: ['class'] });
                if (form.classList.contains('show')) {
                    row.style.display = 'table-row';
                } else {
                    row.style.display = 'none';
                }
            }
        });
    }

    // ===== Firebase লাইভ লিসেনার =====
    onValue(cartonRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            allEntries = Object.keys(data).map(key => ({ key, ...data[key] }));
        } else {
            allEntries = [];
        }
        renderLog();
        document.getElementById('currentDate').innerText = new Date().toLocaleString('bn-BD');
    });

    // ===== ঘড়ি =====
    function updateClock() {
        const now = new Date();
        const bdTime = new Date(now.getTime() + (6 * 60 * 60 * 1000));
        document.getElementById('clockHours').textContent = String(bdTime.getUTCHours()).padStart(2, '0');
        document.getElementById('clockMinutes').textContent = String(bdTime.getUTCMinutes()).padStart(2, '0');
        document.getElementById('clockSeconds').textContent = String(bdTime.getUTCSeconds()).padStart(2, '0');
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Dhaka' };
        document.getElementById('clockDate').textContent = new Date().toLocaleDateString('bn-BD', dateOptions);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded', function() {
        populateDeptDropdown();
        const today = new Date().toISOString().slice(0,10);
        document.getElementById('entryDate').value = today;
        document.getElementById('currentDate').innerText = new Date().toLocaleString('bn-BD');
        autoSelectShift();
        document.getElementById('entryDate').addEventListener('change', autoSelectShift);
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = function() {
                window.speechSynthesis.getVoices();
            };
        }
    });
</script>
</body>
</html>
