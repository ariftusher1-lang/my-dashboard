<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অটো ক্যালকুলেশন সহ ডেটা এন্ট্রি</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fc; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a3a5c; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #007bff; }
        .section h3 { margin-top: 0; color: #333; }
        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .row > div { flex: 1; min-width: 150px; }
        label { font-weight: bold; display: block; font-size: 13px; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        input:disabled { background: #e9ecef; color: #495057; }
        button { background: #28a745; color: white; border: none; padding: 14px; font-size: 18px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 25px; font-weight: bold; }
        button:hover { background: #218838; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .flex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .highlight { background: #fff3cd; border-left: 3px solid #ffc107; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 অটো ক্যালকুলেশন সহ এন্ট্রি ফর্ম</h2>
    <form id="entryForm">

        <!-- মৌলিক তথ্য -->
        <div class="section">
            <h3>📅 মৌলিক তথ্য</h3>
            <div class="row">
                <div><label>তারিখ (Date)</label><input type="date" id="entryDate" required></div>
                <div><label>শিফট (Shift)</label>
                    <select id="shift"><option value="Day">Day</option><option value="Night">Night</option></select>
                </div>
                <div><label>ডিপার্টমেন্ট</label>
                    <select id="department" required>
                        <option value="">-- সিলেক্ট করুন --</option>
                    </select>
                </div>
                <div><label>আইসি নাম</label>
                    <input type="text" id="icName" placeholder="ডিপার্টমেন্ট সিলেক্ট করলে অটো আসবে" required>
                </div>
            </div>
        </div>

        <!-- মেশিনের ডেটা -->
        <div class="section highlight">
            <h3>⚙️ মেশিনের ডেটা (অটো ক্যালকুলেশন)</h3>
            <div class="row">
                <div><label>Total MC</label>
                    <input type="number" id="totalMC" required placeholder="সংখ্যা দিন">
                </div>
                <div><label>Target MC Run (Running)</label>
                    <input type="number" id="mcRunning" required placeholder="সংখ্যা দিন" oninput="autoCalculate()">
                </div>
                <div><label>MC Will off (Stopped)</label>
                    <input type="number" id="mcStopped" required placeholder="সংখ্যা দিন" oninput="autoCalculate()">
                </div>
            </div>
            <div class="row">
                <div><label>MC Run %</label>
                    <input type="text" id="pctRunning" readonly style="background:#e9ecef;">
                </div>
                <div><label>MC Will off %</label>
                    <input type="text" id="pctStopped" readonly style="background:#e9ecef;">
                </div>
            </div>
        </div>

        <!-- কারণ (Cause of Stop) -->
        <div class="section">
            <h3>⛔ স্টপের কারণ (Cause of Stop - QTY)</h3>
            <div class="flex-grid">
                <div><label>MP Short</label><input type="number" id="mpShort" value="0"></div>
                <div><label>Mold Prob</label><input type="number" id="moldProblem" value="0"></div>
                <div><label>Mold Change</label><input type="number" id="moldChange" value="0"></div>
                <div><label>Sample</label><input type="number" id="underSample" value="0"></div>
                <div><label>MC prob</label><input type="number" id="mcProblem" value="0"></div>
                <div><label>Preventive</label><input type="number" id="preventiveMaintenance" value="0"></div>
                <div><label>No demand</label><input type="number" id="noDemandQty" value="0"></div>
                <div><label>Material short & MB</label><input type="number" id="materialMBShortage" value="0"></div>
                <div><label>Over Stock</label><input type="number" id="overStockWIP" value="0"></div>
                <div><label>Acc short</label><input type="number" id="accessoriesShort" value="0"></div>
            </div>
        </div>

        <!-- এইচআর ও ম্যানপাওয়ার -->
        <div class="section">
            <h3>👥 এইচআর ও ম্যানপাওয়ার</h3>
            <div class="row">
                <div><label>Total MP</label><input type="number" id="totalHR" required></div>
                <div><label>Leave</label><input type="number" id="leaveEmployee" value="0"></div>
                <div><label>Absent</label><input type="number" id="absentEmployee" value="0"></div>
            </div>
        </div>

        <!-- মেশিন টাইপ -->
        <div class="section">
            <h3>🏭 মেশিন টাইপ (Machine Type)</h3>
            <div class="row">
                <div><label>Export MC</label><input type="number" id="exportMC" value="0"></div>
                <div><label>Domestic MC</label><input type="number" id="domesticMC" value="0"></div>
                <div><label>Single MC</label><input type="number" id="singleMC" value="0"></div>
                <div><label>Double MC</label><input type="number" id="doubleMC" value="0"></div>
                <div><label>No Demand (Manpower)</label><input type="number" id="noDemand" value="0"></div>
            </div>
        </div>

        <!-- অপারেটর ও স্টাফ -->
        <div class="section">
            <h3>👨‍🔧 অপারেটর ও স্টাফ</h3>
            <div class="flex-grid">
                <div><label>Prod IC</label><input type="number" id="prodIC" value="0"></div>
                <div><label>SIC</label><input type="number" id="sic" value="0"></div>
                <div><label>MC Operator</label><input type="number" id="mcOperator" value="0"></div>
                <div><label>Packaging Op</label><input type="number" id="packagingOperator" value="0"></div>
                <div><label>Foreman</label><input type="number" id="foreman" value="0"></div>
                <div><label>Senior Operator</label><input type="number" id="seniorOperator" value="0"></div>
                <div><label>Shrink-wrap Op</label><input type="number" id="shrinkOperator" value="0"></div>
                <div><label>Printing Op</label><input type="number" id="printingOperator" value="0"></div>
                <div><label>Mold Change Op</label><input type="number" id="moldChangeOperator" value="0"></div>
                <div><label>Mix/Recycle/Crush</label><input type="number" id="mixRecycle" value="0"></div>
                <div><label>Sub Store</label><input type="number" id="subStore" value="0"></div>
                <div><label>Inventory Op</label><input type="number" id="inventoryOperator" value="0"></div>
                <div><label>FG Delivery</label><input type="number" id="fgDelivery" value="0"></div>
                <div><label>Sharp Tools</label><input type="number" id="sharpTools" value="0"></div>
                <div><label>PSI</label><input type="number" id="psi" value="0"></div>
                <div><label>ERP</label><input type="number" id="erp" value="0"></div>
                <div><label>Floor Housekeeping</label><input type="number" id="floorHousekeeping" value="0"></div>
                <div><label>Rework</label><input type="number" id="rework" value="0"></div>
                <div><label>Welding</label><input type="number" id="welding" value="0"></div>
                <div><label>HR Transfer</label><input type="number" id="hrTransfer" value="0"></div>
            </div>
        </div>

        <button type="submit">💾 ডেটা সেভ করুন</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // =============================================================
    // 🔥 আপনার Google Apps Script URL এখানে বসান
    // =============================================================
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysydKnbUPM318FLov_121PBy--xvndahd5kecetHLnRboavCjWM-lkXtXgteK-WsXjQQ/exec';

    // ============================================================
    // ১. ডিপার্টমেন্ট অনুযায়ী আইসি নাম ম্যাপিং (RIP> DPL> ফরম্যাট)
    // ============================================================
    const DEPARTMENT_IC_MAP = {
        'RIP> DPL> Plastic-3': 'Mr. Shawon',
        'RIP> DPL> Plastic-6.1': 'Mr. Hazrat',
        'RIP> DPL> Plastic-6.2': 'Mr. Polash',
        'RIP> DPL> Plastic-7.1': 'Mr. Monir',
        'RIP> DPL> Plastic-7.2': 'Mr. Sayem',
        'RIP> DPL> Plastic-7.3': 'Mr. Saddam',
        'RIP> DPL> Plastic-7.4': 'Mr. Saddam',
        'RIP> DPL> Plastic-1': 'Mr. Aqtiqur Rahman',
        'Plastic Packaging-01': 'Mr, Mahbub',
        'Plastic Packaging-02': 'Mr, Rakib',
        'Plastic Packaging-03': 'Mr, Mahbub'
    };

    // ============================================================
    // ২. ডিপার্টমেন্ট অনুযায়ী Total MC ম্যাপিং (RIP> DPL> ফরম্যাট)
    //    👇 এখন ড্রপডাউনের সাথে পুরোপুরি মিলে গেছে
    // ============================================================
    const DEPARTMENT_MC = {
        // Production Depts (RIP> DPL> ভিত্তিক)
        'RIP> DPL> Plastic-3': 61,
        'RIP> DPL> Plastic-6.1': 0,   // যদি জানা না থাকে, 0 রাখা হয়েছে (ইউজার টাইপ করবে)
        'RIP> DPL> Plastic-6.2': 0,
        'RIP> DPL> Plastic-7.1': 36,
        'RIP> DPL> Plastic-7.2': 76,
        'RIP> DPL> Plastic-7.3': 77,
        'RIP> DPL> Plastic-7.4': 35,
        'RIP> DPL> Plastic-1': 0,
        // Packaging
        'Plastic Packaging-01': 0,
        'Plastic Packaging-02': 0,
        'Plastic Packaging-03': 0,
        // পুরোনো নামগুলোও রেখেছি (যদি কোনো কারণে ব্যবহার হয়)
        'Plastic Prod-3.1': 61,
        'Plastic Prod-7.1': 36,
        'Plastic Prod-7.2': 76,
        'Plastic Prod-7.3': 77,
        'Plastic Prod-7.4': 35,
        'Corporate sales Production': 0,
        'DPL-QA': 0,
        'Plastic Inventory & Delivery': 0
    };

    // ============================================================
    // ৩. সব ডিপার্টমেন্ট ড্রপডাউনে যোগ করা (IC ম্যাপ + Prof 01-360)
    // ============================================================
    (function populateDepartments() {
        const select = document.getElementById('department');
        // ক. ইউজারের দেওয়া ডিপার্টমেন্ট (RIP> DPL> ও Packaging)
        Object.keys(DEPARTMENT_IC_MAP).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = key;
            select.appendChild(opt);
        });
        // খ. Plastic Prof-01 to 360 (এদের MC ও IC খালি থাকবে, ইউজার টাইপ করবে)
        for (let i = 1; i <= 360; i++) {
            const opt = document.createElement('option');
            opt.value = `Plastic Prof-${String(i).padStart(2, '0')}`;
            opt.textContent = `Plastic Prof-${String(i).padStart(2, '0')}`;
            select.appendChild(opt);
        }
    })();

    // ============================================================
    // ৪. ডিপার্টমেন্ট চেইঞ্জ হলে IC Name + MC সেট
    // ============================================================
    document.getElementById('department').addEventListener('change', function() {
        const dept = this.value;
        const icInput = document.getElementById('icName');
        const totalInput = document.getElementById('totalMC');

        // আইসি নাম অটো (ম্যাপে থাকলে)
        if (DEPARTMENT_IC_MAP[dept]) {
            icInput.value = DEPARTMENT_IC_MAP[dept];
        } else {
            icInput.value = ''; // ইউজার নিজে লিখবে
        }

        // Total MC অটো (ম্যাপে থাকলে)
        if (dept in DEPARTMENT_MC) {
            const mcVal = DEPARTMENT_MC[dept];
            totalInput.value = mcVal;
            if (mcVal > 0) {
                // যদি MC জানা থাকে, readonly করে দিই
                totalInput.readOnly = true;
                totalInput.style.background = '#e9ecef';
                totalInput.style.color = '#004085';
            } else {
                // যদি MC 0 হয়, তাহলে ইউজার টাইপ করবে
                totalInput.value = '';
                totalInput.readOnly = false;
                totalInput.style.background = '#ffffff';
                totalInput.style.color = '#000000';
                totalInput.placeholder = 'সংখ্যা দিন';
            }
        } else {
            // যদি ডিপার্টমেন্ট ম্যাপে না থাকে (যেমন Plastic Prof-01)
            totalInput.value = '';
            totalInput.readOnly = false;
            totalInput.style.background = '#ffffff';
            totalInput.style.color = '#000000';
            totalInput.placeholder = 'সংখ্যা দিন';
        }

        // রানিং/স্টপড রিসেট
        document.getElementById('mcRunning').value = '';
        document.getElementById('mcStopped').value = '';
        document.getElementById('pctRunning').value = '';
        document.getElementById('pctStopped').value = '';
    });

    // ============================================================
    // ৫. মেশিন রান/স্টপ অটো ক্যালকুলেশন
    // ============================================================
    function autoCalculate() {
        const total = parseInt(document.getElementById('totalMC').value) || 0;
        let running = parseInt(document.getElementById('mcRunning').value) || 0;
        let stopped = parseInt(document.getElementById('mcStopped').value) || 0;
        if (total === 0) {
            document.getElementById('pctRunning').value = '0%';
            document.getElementById('pctStopped').value = '0%';
            return;
        }
        const active = document.activeElement;
        const rInput = document.getElementById('mcRunning');
        const sInput = document.getElementById('mcStopped');
        if (active === rInput) {
            if (running > total) running = total;
            document.getElementById('mcRunning').value = running;
            stopped = total - running;
            document.getElementById('mcStopped').value = stopped;
        } else if (active === sInput) {
            if (stopped > total) stopped = total;
            document.getElementById('mcStopped').value = stopped;
            running = total - stopped;
            document.getElementById('mcRunning').value = running;
        } else {
            if (running + stopped !== total && (running > 0 || stopped > 0)) {
                if (running > 0 && running <= total) {
                    stopped = total - running;
                    document.getElementById('mcStopped').value = stopped;
                } else if (stopped > 0 && stopped <= total) {
                    running = total - stopped;
                    document.getElementById('mcRunning').value = running;
                }
            }
        }
        let pctR = 0, pctS = 0;
        if (total > 0) {
            pctR = (running / total) * 100;
            pctS = (stopped / total) * 100;
        }
        document.getElementById('pctRunning').value = pctR.toFixed(2) + '%';
        document.getElementById('pctStopped').value = pctS.toFixed(2) + '%';
    }

    // ============================================================
    // ৬. ফর্ম সাবমিট (CORS সমাধান: no-cors)
    // ============================================================
    document.getElementById('entryDate').valueAsDate = new Date();

    document.getElementById('entryForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const status = document.getElementById('status');
        status.className = '';
        status.innerText = '⏳ সেভ হচ্ছে...';
        const getVal = (id) => document.getElementById(id).value;
        
        const payload = {
            entryDate: getVal('entryDate'),
            shift: getVal('shift'),
            department: getVal('department'),
            icName: getVal('icName'),
            totalMC: getVal('totalMC'),
            mcRunning: getVal('mcRunning'),
            mcStopped: getVal('mcStopped'),
            pctRunning: getVal('pctRunning'),
            pctStopped: getVal('pctStopped'),
            // CTN ডেটা (আপনি চান না, তাই 0 দিচ্ছি)
            prodHR: '0',
            targetCTN: '0',
            achievedCTN: '0',
            perHrCTN: '0',
            utilizationPct: '0%',
            // Cause of Stop
            mpShort: getVal('mpShort'),
            moldProblem: getVal('moldProblem'),
            moldChange: getVal('moldChange'),
            underSample: getVal('underSample'),
            mcProblem: getVal('mcProblem'),
            preventiveMaintenance: getVal('preventiveMaintenance'),
            noDemandQty: getVal('noDemandQty'),
            materialMBShortage: getVal('materialMBShortage'),
            overStockWIP: getVal('overStockWIP'),
            accessoriesShort: getVal('accessoriesShort'),
            // HR
            totalHR: getVal('totalHR'),
            leaveEmployee: getVal('leaveEmployee'),
            absentEmployee: getVal('absentEmployee'),
            // Machine Type
            exportMC: getVal('exportMC'),
            domesticMC: getVal('domesticMC'),
            singleMC: getVal('singleMC'),
            doubleMC: getVal('doubleMC'),
            noDemand: getVal('noDemand'),
            // Operators
            prodIC: getVal('prodIC'),
            sic: getVal('sic'),
            mcOperator: getVal('mcOperator'),
            packagingOperator: getVal('packagingOperator'),
            foreman: getVal('foreman'),
            seniorOperator: getVal('seniorOperator'),
            shrinkOperator: getVal('shrinkOperator'),
            printingOperator: getVal('printingOperator'),
            moldChangeOperator: getVal('moldChangeOperator'),
            mixRecycle: getVal('mixRecycle'),
            subStore: getVal('subStore'),
            inventoryOperator: getVal('inventoryOperator'),
            fgDelivery: getVal('fgDelivery'),
            sharpTools: getVal('sharpTools'),
            psi: getVal('psi'),
            erp: getVal('erp'),
            floorHousekeeping: getVal('floorHousekeeping'),
            rework: getVal('rework'),
            welding: getVal('welding'),
            hrTransfer: getVal('hrTransfer')
        };

        try {
            // ==========================================================
            // 🚀 CORS সমস্যা সমাধানের জন্য 'mode: no-cors' ব্যবহার করা হয়েছে
            // ==========================================================
            await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            status.className = 'success';
            status.innerText = '✅ ডেটা পাঠানো হয়েছে! Google Sheet চেক করুন।';
            
            // ফর্ম রিসেট
            document.getElementById('mcRunning').value = '';
            document.getElementById('mcStopped').value = '';
            document.getElementById('pctRunning').value = '';
            document.getElementById('pctStopped').value = '';

        } catch (error) {
            status.className = 'error';
            status.innerText = '❌ সেভ করতে ব্যর্থ! নেটওয়ার্ক চেক করুন।';
            console.error('Error details:', error);
        }
    });
</script>
</body>
</html>
