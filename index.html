<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>প্রতিদিনের এন্ট্রি ফর্ম + রিভিউ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #f0f4f8;
            padding: 12px;
            font-size: 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 16px 14px 20px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h2 {
            font-size: 18px;
            color: #c62828;
            border-bottom: 3px solid #0d47a1;
            padding-bottom: 10px;
            margin-bottom: 14px;
            line-height: 1.3;
        }
        .section {
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 10px;
            margin-top: 14px;
            border-left: 4px solid #0d47a1;
        }
        .section h3 { font-size: 15px; margin-bottom: 8px; color: #1e293b; }
        .row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 2px; }
        .row > div { flex: 1 1 100%; min-width: 0; }
        .flex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
        label { font-weight: 600; display: block; font-size: 13px; margin-bottom: 2px; color: #1e293b; }
        .required-star { color: #d32f2f; }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cdd5df;
            border-radius: 8px;
            font-size: 16px;
            background: #fff;
            -webkit-appearance: none;
            appearance: none;
        }
        input::placeholder { color: #b71c1c; font-weight: 600; font-size: 13px; opacity: 0.7; }
        input[readonly] { background: #f1f4f8; color: #b71c1c !important; font-weight: 600; }
        .machine-box { border: 2px solid #0d47a1; border-radius: 12px; padding: 14px; background: #fff; }
        .qty-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff3cd;
            border: 1.5px dashed #f9a825;
            border-radius: 8px;
            padding: 6px;
            min-height: 48px;
            font-weight: 700;
            color: #b71c1c;
            font-size: 14px;
        }
        button {
            background: #1e7e34;
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 18px;
            transition: 0.2s;
            touch-action: manipulation;
        }
        button:active { transform: scale(0.97); background: #146c2a; }
        .btn-secondary { background: #0d47a1; }
        .btn-secondary:active { background: #0a3a7a; }
        .btn-danger { background: #b71c1c; }
        .btn-danger:active { background: #8f1515; }
        #status {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }
        .success { background: #d4edda; color: #0b5e2e; border: 1px solid #b7dfb9; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        #duplicateAlert {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1.5px solid #f5c6cb;
            display: none;
            font-weight: 600;
        }
        #duplicateAlert.show { display: block; }
        #reportSection {
            margin-top: 24px;
            border-top: 3px solid #0d47a1;
            padding-top: 16px;
            display: none;
        }
        #reportSection h3 { font-size: 18px; color: #0d47a1; margin-bottom: 8px; }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: #eef2f7;
            padding: 10px 12px;
            border-radius: 10px;
            margin: 10px 0 14px 0;
            align-items: flex-end;
        }
        .filter-bar > div { flex: 1 1 120px; min-width: 100px; }
        .filter-bar label { font-size: 12px; margin-bottom: 2px; }
        .filter-bar input, .filter-bar select { padding: 8px 10px; font-size: 14px; }
        .filter-bar .filter-actions { display: flex; gap: 6px; flex: 0 1 auto; }
        .filter-bar .filter-actions button { padding: 8px 14px; font-size: 14px; margin-top: 0; width: auto; }
        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            background: #fff;
        }
        th {
            background: #0d47a1;
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 2;
            padding: 6px 4px;
            white-space: nowrap;
            text-align: center;
        }
        td {
            padding: 5px 3px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
            white-space: nowrap;
        }
        tr:nth-child(even) { background: #f8fafc; }
        .report-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .report-actions button {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            font-size: 15px;
            margin-top: 0;
        }
        .loader { text-align: center; padding: 20px; font-size: 16px; color: #0d47a1; }
        .no-data { text-align: center; padding: 20px; font-size: 15px; color: #666; }
        .filter-count { font-size: 14px; color: #0d47a1; font-weight: 600; margin-left: 6px; }
        .offline-badge {
            background: #ff9800;
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: none;
            margin-left: 8px;
        }
        .offline-badge.show { display: inline-block; }
        .review-section {
            margin-top: 10px;
            display: none;
            text-align: center;
        }
        .review-section.show { display: block; }
        .review-section button {
            padding: 12px;
            font-size: 16px;
            margin-top: 0;
            width: auto;
            display: inline-block;
        }
        @media (max-width: 480px) {
            .container { padding: 12px 10px; }
            h2 { font-size: 16px; }
            .section { padding: 10px 12px; }
            .flex-grid { grid-template-columns: 1fr 1fr; }
            input, select { font-size: 15px; padding: 8px 10px; }
            button { font-size: 16px; padding: 14px; }
            .filter-bar > div { flex: 1 1 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 এন্ট্রি ফর্ম <span class="offline-badge" id="offlineBadge">📶 অফলাইন</span></h2>

    <form id="entryForm" novalidate>
        <div class="section">
            <h3>📅 মৌলিক তথ্য</h3>
            <div class="row">
                <div><label>তারিখ <span class="required-star">*</span></label><input type="date" id="entryDate" required /></div>
                <div><label>শিফট <span class="required-star">*</span></label>
                    <select id="shift" required><option value="Day">Day</option><option value="Night">Night</option></select>
                </div>
                <div><label>ডিপার্টমেন্ট <span class="required-star">*</span></label>
                    <select id="department" required><option value="">-- সিলেক্ট --</option></select>
                </div>
                <div><label>আইসি নাম <span class="required-star">*</span></label>
                    <input type="text" id="icName" placeholder="অটো আসবে" required readonly />
                </div>
            </div>
        </div>

        <div class="section machine-box" id="mcDataSection">
            <h3>⚙️ মেশিনের ডেটা</h3>
            <div class="row">
                <div><label>Total MC</label><input type="number" id="totalMC" placeholder="Typ QTY" readonly /></div>
                <div><label>Target MC Run</label><input type="number" id="mcRunning" placeholder="Typ QTY" oninput="autoCalculate()" /></div>
                <div><label>MC Will off</label><input type="number" id="mcStopped" placeholder="Typ QTY" oninput="autoCalculate()" /></div>
            </div>
            <div class="row">
                <div><label>MC Run %</label><input type="text" id="pctRunning" readonly style="background:#fff; color:#b71c1c; font-weight:700;" /></div>
                <div><label>MC Will off %</label><input type="text" id="pctStopped" readonly style="background:#fff; color:#b71c1c; font-weight:700;" /></div>
            </div>
        </div>

        <div class="section" id="causeSection">
            <h3>⛔ স্টপের কারণ</h3>
            <div class="flex-grid">
                <div><label>MP Short</label><input type="number" id="mpShort" placeholder="Typ" /></div>
                <div><label>Mold Prob</label><input type="number" id="moldProblem" placeholder="Typ" /></div>
                <div><label>Mold Change</label><input type="number" id="moldChange" placeholder="Typ" /></div>
                <div><label>Sample</label><input type="number" id="underSample" placeholder="Typ" /></div>
                <div><label>MC prob</label><input type="number" id="mcProblem" placeholder="Typ" /></div>
                <div><label>Preventive</label><input type="number" id="preventiveMaintenance" placeholder="Typ" /></div>
                <div><label>No demand</label><input type="number" id="noDemandQty" placeholder="Typ" /></div>
                <div><label>Material short</label><input type="number" id="materialMBShortage" placeholder="Typ" /></div>
                <div><label>Over Stock</label><input type="number" id="overStockWIP" placeholder="Typ" /></div>
                <div><label>Acc short</label><input type="number" id="accessoriesShort" placeholder="Typ" /></div>
            </div>
        </div>

        <div class="section">
            <h3>👥 এইচআর ও ম্যানপাওয়ার</h3>
            <div class="row">
                <div><label>Total Present <span class="required-star">*</span></label><input type="number" id="totalPresent" placeholder="Typ" required /></div>
                <div><label>Leave</label><input type="number" id="leaveEmployee" placeholder="Typ" /></div>
                <div><label>Absent</label><input type="number" id="absentEmployee" placeholder="Typ" /></div>
            </div>
        </div>

        <div class="section" id="machineTypeSection">
            <h3>🏭 মেশিন টাইপ</h3>
            <div class="row">
                <div><label>Export MC</label><input type="number" id="exportMC" placeholder="Typ" /></div>
                <div><label>Domestic MC</label><input type="number" id="domesticMC" placeholder="Typ" /></div>
                <div><label>Single MC</label><input type="number" id="singleMC" placeholder="Typ" /></div>
                <div><label>Double MC</label><input type="number" id="doubleMC" placeholder="Typ" /></div>
                <div class="qty-placeholder">Typ QTY</div>
            </div>
        </div>

        <div class="section" id="operatorSection">
            <h3>👨‍🔧 অপারেটর ও স্টাফ</h3>
            <div class="flex-grid">
                <div><label>Prod IC</label><input type="number" id="prodIC" placeholder="Typ" /></div>
                <div><label>SIC</label><input type="number" id="sic" placeholder="Typ" /></div>
                <div><label>MC Operator</label><input type="number" id="mcOperator" placeholder="Typ" /></div>
                <div><label>Packaging Op</label><input type="number" id="packagingOperator" placeholder="Typ" /></div>
                <div><label>Foreman</label><input type="number" id="foreman" placeholder="Typ" /></div>
                <div><label>Senior Operator</label><input type="number" id="seniorOperator" placeholder="Typ" /></div>
                <div><label>Shrink-wrap Op</label><input type="number" id="shrinkOperator" placeholder="Typ" /></div>
                <div><label>Printing Op</label><input type="number" id="printingOperator" placeholder="Typ" /></div>
                <div><label>Mold Change Op</label><input type="number" id="moldChangeOperator" placeholder="Typ" /></div>
                <div><label>Mix/Recycle</label><input type="number" id="mixRecycle" placeholder="Typ" /></div>
                <div><label>Sub Store</label><input type="number" id="subStore" placeholder="Typ" /></div>
                <div><label>Inventory Op</label><input type="number" id="inventoryOperator" placeholder="Typ" /></div>
                <div><label>FG Delivery</label><input type="number" id="fgDelivery" placeholder="Typ" /></div>
                <div><label>Sharp Tools</label><input type="number" id="sharpTools" placeholder="Typ" /></div>
                <div><label>PSI</label><input type="number" id="psi" placeholder="Typ" /></div>
                <div><label>ERP</label><input type="number" id="erp" placeholder="Typ" /></div>
                <div><label>Floor Housekeeping</label><input type="number" id="floorHousekeeping" placeholder="Typ" /></div>
                <div><label>Rework</label><input type="number" id="rework" placeholder="Typ" /></div>
                <div><label>Welding</label><input type="number" id="welding" placeholder="Typ" /></div>
                <div><label>HR Transfer</label><input type="number" id="hrTransfer" placeholder="Typ" /></div>
            </div>
        </div>

        <button type="submit">💾 সেভ করুন</button>
        <div id="duplicateAlert">⚠️ এই তারিখ, শিফট ও ডিপার্টমেন্টে ইতিমধ্যে এন্ট্রি আছে!</div>
    </form>

    <div id="status"></div>

    <div class="review-section" id="reviewSection">
        <button type="button" id="viewMyEntryBtn" class="btn-secondary">📋 আমার এন্ট্রি দেখুন</button>
    </div>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button type="button" id="showReportBtn" class="btn-secondary" style="flex:1;">📊 রিপোর্ট দেখুন</button>
        <button type="button" id="hideReportBtn" class="btn-danger" style="flex:1; display:none;">❌ বন্ধ করুন</button>
    </div>

    <div id="reportSection">
        <h3>📋 Admin Report <span id="filterCount" class="filter-count"></span></h3>
        <div class="filter-bar">
            <div><label>ডিপার্টমেন্ট</label><select id="filterDept"><option value="">সব</option></select></div>
            <div><label>তারিখ</label><input type="date" id="filterDate" /></div>
            <div><label>শিফট</label><select id="filterShift"><option value="">সব</option><option value="Day">Day</option><option value="Night">Night</option></select></div>
            <div class="filter-actions">
                <button type="button" id="applyFilterBtn" class="btn-secondary">🔍 ফিল্টার</button>
                <button type="button" id="clearFilterBtn" class="btn-danger">🗑️ রিসেট</button>
            </div>
        </div>
        <div class="report-actions">
            <button id="refreshReportBtn" class="btn-secondary">🔄 রিফ্রেশ</button>
            <button id="exportCsvBtn" class="btn-secondary">⬇ CSV</button>
        </div>
        <div id="reportContent"><div class="loader">⏳ ডেটা লোড হচ্ছে...</div></div>
    </div>
</div>

<script>
    // ============================================================
    // 🚀  আপনার Apps Script URL (আপনার দেওয়া URL)
    // ============================================================
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzqGLB3XFKqtyMmdj7XBX5C6E8bURTSQWNnhirY34zBzlJMm9yobpPDv0sh166Yz-nZ9A/exec';

    // ---------- ডিপার্টমেন্ট ম্যাপিং (আপনার দেওয়া) ----------
    const DEPARTMENT_IC_MAP = {
        'RIP> DPL> Plastic-3': 'Mr. Shawon',
        'RIP> DPL> Plastic-6.1': 'Mr. Hazrat',
        'RIP> DPL> Plastic-6.2': 'Mr. Polash',
        'RIP> DPL> Plastic-7.1': 'Mr. Monir',
        'RIP> DPL> Plastic-7.2': 'Mr. Sayem',
        'RIP> DPL> Plastic-7.3': 'Mr. Saddam',
        'RIP> DPL> Plastic-7.4': 'Mr. Saddam',
        'RIP> DPL> Plastic-1': 'Mr. Atiqur Rahman',
        'Plastic Packaging-01': 'Mr. Mahbub',
        'Plastic Packaging-02': 'Mr. Rakib',
        'Plastic Packaging-03': 'Mr. Mahbub',
        'Plastic-Maintenance.': 'Mr. Maruf',
        'Tool Room Maintenance': 'Mr. Jabed',
        'Plastic Inventory & Delivery': 'Mr. Faysal',
        'Corporate sales Production.': 'Mr. Atiq',
        'Plastics-Recycle & Silo': 'Mr. Rofik',
        'Product Development & Mold Change': 'Mr. Dibakor',
        'RIP-DPL-Factory Support': 'Mr. Rofik',
        'DPL-QA': 'Mr. Rafi',
        'RIP RFL Store': 'Mr. Mithun',
        'Silicon Project': 'Mamun'
    };
    const DEPARTMENT_MC = {
        'RIP> DPL> Plastic-3': 61, 'RIP> DPL> Plastic-6.1': 39, 'RIP> DPL> Plastic-6.2': 59,
        'RIP> DPL> Plastic-7.1': 36, 'RIP> DPL> Plastic-7.2': 71, 'RIP> DPL> Plastic-7.3': 77,
        'RIP> DPL> Plastic-7.4': 35, 'RIP> DPL> Plastic-1': 38, 'Silicon Project': 9,
        'Plastic Packaging-01': 0, 'Plastic Packaging-02': 0, 'Plastic Packaging-03': 0,
        'Plastic-Maintenance.': 0, 'Tool Room Maintenance': 0, 'Plastic Inventory & Delivery': 0,
        'Corporate sales Production.': 0, 'Plastics-Recycle & Silo': 0,
        'Product Development & Mold Change': 0, 'RIP-DPL-Factory Support': 0,
        'DPL-QA': 0, 'RIP RFL Store': 0
    };
    const NON_MC_DEPTS = [
        'Plastic Packaging-01', 'Plastic Packaging-02', 'Plastic Packaging-03',
        'Plastic-Maintenance.', 'Tool Room Maintenance', 'Plastic Inventory & Delivery',
        'Corporate sales Production.', 'Plastics-Recycle & Silo',
        'Product Development & Mold Change', 'RIP-DPL-Factory Support',
        'DPL-QA', 'RIP RFL Store'
    ];

    // ---------- নেটওয়ার্ক চেক ----------
    function checkNetwork() {
        const badge = document.getElementById('offlineBadge');
        if (!navigator.onLine) {
            badge.classList.add('show');
            return false;
        } else {
            badge.classList.remove('show');
            return true;
        }
    }
    window.addEventListener('online', () => document.getElementById('offlineBadge').classList.remove('show'));
    window.addEventListener('offline', () => document.getElementById('offlineBadge').classList.add('show'));

    // ---------- ড্রপডাউন ----------
    function populateDepartments() {
        const sel = document.getElementById('department');
        sel.innerHTML = '<option value="">-- সিলেক্ট --</option>';
        Object.keys(DEPARTMENT_IC_MAP).forEach(k => {
            const o = document.createElement('option');
            o.value = k; o.textContent = k; sel.appendChild(o);
        });
        const fDept = document.getElementById('filterDept');
        fDept.innerHTML = '<option value="">সব</option>';
        Object.keys(DEPARTMENT_IC_MAP).forEach(k => {
            const o = document.createElement('option');
            o.value = k; o.textContent = k; fDept.appendChild(o);
        });
    }

    function toggleMcFields(dept) {
        const isNon = NON_MC_DEPTS.includes(dept);
        ['mcDataSection','causeSection','machineTypeSection','operatorSection'].forEach(id => {
            document.getElementById(id).style.display = isNon ? 'none' : 'block';
        });
    }

    document.getElementById('department').addEventListener('change', function() {
        const d = this.value;
        document.getElementById('icName').value = DEPARTMENT_IC_MAP[d] || '';
        const total = document.getElementById('totalMC');
        if (d in DEPARTMENT_MC) {
            const v = DEPARTMENT_MC[d];
            if (v > 0) { total.value = v; total.readOnly = true; }
            else { total.value = ''; total.readOnly = false; total.placeholder = 'Typ QTY'; }
        } else { total.value = ''; total.readOnly = false; total.placeholder = 'Typ QTY'; }
        toggleMcFields(d);
        document.getElementById('mcRunning').value = '';
        document.getElementById('mcStopped').value = '';
        document.getElementById('pctRunning').value = '';
        document.getElementById('pctStopped').value = '';
    });

    function autoCalculate() {
        const total = parseInt(document.getElementById('totalMC').value) || 0;
        let running = parseInt(document.getElementById('mcRunning').value) || 0;
        let stopped = parseInt(document.getElementById('mcStopped').value) || 0;
        if (total === 0) {
            document.getElementById('pctRunning').value = '0%';
            document.getElementById('pctStopped').value = '0%';
            return;
        }
        const active = document.activeElement;
        const r = document.getElementById('mcRunning');
        const s = document.getElementById('mcStopped');
        if (active === r) {
            if (running > total) running = total;
            r.value = running;
            stopped = total - running;
            s.value = stopped;
        } else if (active === s) {
            if (stopped > total) stopped = total;
            s.value = stopped;
            running = total - stopped;
            r.value = running;
        } else {
            if (running + stopped !== total && (running > 0 || stopped > 0)) {
                if (running > 0 && running <= total) { stopped = total - running; s.value = stopped; }
                else if (stopped > 0 && stopped <= total) { running = total - stopped; r.value = running; }
            }
        }
        let pR = 0, pS = 0;
        if (total > 0) { pR = (running/total)*100; pS = (stopped/total)*100; }
        document.getElementById('pctRunning').value = pR.toFixed(2) + '%';
        document.getElementById('pctStopped').value = pS.toFixed(2) + '%';
    }

    // ---------- ডুপ্লিকেট চেক (Apps Script-এর মাধ্যমে) ----------
    async function checkDuplicate(date, shift, dept) {
        try {
            const url = `${APP_SCRIPT_URL}?action=check&date=${encodeURIComponent(date)}&shift=${encodeURIComponent(shift)}&dept=${encodeURIComponent(dept)}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Network error');
            const result = await resp.json();
            return result.exists === true;
        } catch (e) {
            console.warn('Check failed, allowing save:', e);
            return false;
        }
    }

    function resetForm() {
        const fields = [
            'entryDate','shift','department','icName','totalMC','mcRunning','mcStopped',
            'pctRunning','pctStopped','mpShort','moldProblem','moldChange','underSample',
            'mcProblem','preventiveMaintenance','noDemandQty','materialMBShortage',
            'overStockWIP','accessoriesShort','totalPresent','leaveEmployee','absentEmployee',
            'exportMC','domesticMC','singleMC','doubleMC','prodIC','sic','mcOperator',
            'packagingOperator','foreman','seniorOperator','shrinkOperator','printingOperator',
            'moldChangeOperator','mixRecycle','subStore','inventoryOperator','fgDelivery',
            'sharpTools','psi','erp','floorHousekeeping','rework','welding','hrTransfer'
        ];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                if (el.type === 'select-one') el.selectedIndex = 0;
                else if (el.type !== 'date') el.value = '';
            }
        });
        document.getElementById('entryDate').valueAsDate = new Date();
        document.getElementById('shift').value = 'Day';
        document.getElementById('department').value = '';
        document.getElementById('icName').value = '';
        document.getElementById('duplicateAlert').classList.remove('show');
        document.getElementById('duplicateAlert').style.display = 'none';
        document.getElementById('status').className = '';
        document.getElementById('status').innerText = '';
        document.getElementById('reviewSection').classList.remove('show');
        toggleMcFields('');
    }

    // ---------- ফর্ম সাবমিট ----------
    let lastSubmittedData = null;

    document.getElementById('entryForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const status = document.getElementById('status');
        const dupAlert = document.getElementById('duplicateAlert');
        dupAlert.classList.remove('show');
        dupAlert.style.display = 'none';
        status.className = '';
        status.innerText = '⏳ যাচাই করা হচ্ছে...';

        if (!navigator.onLine) {
            status.className = 'warning';
            status.innerText = '📶 আপনি অফলাইনে আছেন! ইন্টারনেট কানেক্ট করে আবার চেষ্টা করুন।';
            return;
        }

        const date = document.getElementById('entryDate').value;
        const shift = document.getElementById('shift').value;
        const dept = document.getElementById('department').value;
        const icName = document.getElementById('icName').value;
        const totalPresent = document.getElementById('totalPresent').value;

        if (!date || !shift || !dept || !icName || !totalPresent) {
            status.className = 'error';
            status.innerText = '❌ দয়া করে সব * চিহ্নিত ফিল্ড পূরণ করুন!';
            return;
        }

        // ডুপ্লিকেট চেক (সার্ভার সাইড)
        const isDup = await checkDuplicate(date, shift, dept);
        if (isDup) {
            dupAlert.style.display = 'block';
            dupAlert.classList.add('show');
            status.className = 'error';
            status.innerText = '❌ ডুপ্লিকেট এন্ট্রি অনুমোদিত নয়!';
            return;
        }

        status.innerText = '⏳ সেভ হচ্ছে...';

        const getVal = (id) => document.getElementById(id).value;
        const getNum = (id) => parseInt(document.getElementById(id).value) || 0;

        const payload = {
            entryDate: date, shift, department: dept, icName,
            totalMC: getNum('totalMC'), mcRunning: getNum('mcRunning'),
            mcStopped: getNum('mcStopped'), pctRunning: getVal('pctRunning') || '0%',
            pctStopped: getVal('pctStopped') || '0%',
            prodHR: '0', targetCTN: '0', achievedCTN: '0', perHrCTN: '0', utilizationPct: '0%',
            mpShort: getNum('mpShort'), moldProblem: getNum('moldProblem'),
            moldChange: getNum('moldChange'), underSample: getNum('underSample'),
            mcProblem: getNum('mcProblem'), preventiveMaintenance: getNum('preventiveMaintenance'),
            noDemandQty: getNum('noDemandQty'), materialMBShortage: getNum('materialMBShortage'),
            overStockWIP: getNum('overStockWIP'), accessoriesShort: getNum('accessoriesShort'),
            totalHR: getNum('totalPresent'), totalMP: getNum('totalPresent'),
            'Total HR': getNum('totalPresent'), totalPresent: getNum('totalPresent'),
            leaveEmployee: getNum('leaveEmployee'), absentEmployee: getNum('absentEmployee'),
            exportMC: getNum('exportMC'), domesticMC: getNum('domesticMC'),
            singleMC: getNum('singleMC'), doubleMC: getNum('doubleMC'),
            noDemand: '0',
            prodIC: getNum('prodIC'), sic: getNum('sic'), mcOperator: getNum('mcOperator'),
            packagingOperator: getNum('packagingOperator'), foreman: getNum('foreman'),
            seniorOperator: getNum('seniorOperator'), shrinkOperator: getNum('shrinkOperator'),
            printingOperator: getNum('printingOperator'), moldChangeOperator: getNum('moldChangeOperator'),
            mixRecycle: getNum('mixRecycle'), subStore: getNum('subStore'),
            inventoryOperator: getNum('inventoryOperator'), fgDelivery: getNum('fgDelivery'),
            sharpTools: getNum('sharpTools'), psi: getNum('psi'), erp: getNum('erp'),
            floorHousekeeping: getNum('floorHousekeeping'), rework: getNum('rework'),
            welding: getNum('welding'), hrTransfer: getNum('hrTransfer')
        };

        try {
            // CORS ঠিক: mode ডিফল্ট (cors)
            const response = await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const result = await response.json();

            if (result.success) {
                status.className = 'success';
                status.innerText = result.message || '✅ আপনার তথ্য সঠিকভাবে জমা হয়েছে!';
                lastSubmittedData = { date, shift, dept };
                document.getElementById('reviewSection').classList.add('show');
                if (document.getElementById('reportSection').style.display === 'block') {
                    fetchAndRenderReport();
                }
                resetForm();
            } else {
                status.className = 'error';
                status.innerText = result.message || '❌ সেভ করতে ব্যর্থ!';
            }
        } catch (error) {
            console.error('Fetch error:', error);
            status.className = 'error';
            status.innerText = '❌ সেভ করতে ব্যর্থ! নেটওয়ার্ক চেক করুন। (Error: ' + error.message + ')';
        }
    });

    // "আমার এন্ট্রি দেখুন" বাটন
    document.getElementById('viewMyEntryBtn').addEventListener('click', function() {
        if (!lastSubmittedData) return;
        const { date, shift, dept } = lastSubmittedData;
        document.getElementById('filterDate').value = date;
        document.getElementById('filterShift').value = shift;
        document.getElementById('filterDept').value = dept;
        document.getElementById('reportSection').style.display = 'block';
        document.getElementById('showReportBtn').style.display = 'none';
        document.getElementById('hideReportBtn').style.display = 'block';
        if (allReportData.length > 0) {
            const filtered = applyFilters(allReportData);
            renderTable(filtered);
        } else {
            fetchAndRenderReport();
        }
        document.getElementById('reviewSection').classList.remove('show');
    });

    // ============================================================
    //  📊  ADMIN REPORT – ফিল্টার সহ
    // ============================================================
    let allReportData = [];

    function normalizeDate(d) {
        if (!d) return '';
        if (d instanceof Date) {
            const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
            return y+'-'+m+'-'+day;
        }
        const s = String(d).trim();
        if (!s) return '';
        let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) return m[1]+'-'+m[2]+'-'+m[3];
        m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
        if (m) return m[3]+'-'+m[2]+'-'+m[1];
        if (s.length >= 10) {
            const sub = s.substring(0,10);
            if (/^\d{4}-\d{2}-\d{2}$/.test(sub)) return sub;
        }
        return s;
    }

    async function fetchAllData() {
        const container = document.getElementById('reportContent');
        container.innerHTML = '<div class="loader">⏳ ডেটা লোড...</div>';
        try {
            const resp = await fetch(`${APP_SCRIPT_URL}?action=getData`);
            if (!resp.ok) throw new Error('Network error');
            const result = await resp.json();
            allReportData = result.data || [];
            return allReportData;
        } catch (e) {
            console.error('Fetch error:', e);
            container.innerHTML = '<div class="error">❌ ডেটা লোড ব্যর্থ! নেটওয়ার্ক চেক করুন।</div>';
            return null;
        }
    }

    function applyFilters(data) {
        const dept = document.getElementById('filterDept').value;
        const date = document.getElementById('filterDate').value;
        const shift = document.getElementById('filterShift').value;
        return data.filter(row => {
            if (dept && row['Department'] !== dept) return false;
            if (date) {
                const rd = normalizeDate(row['Date']);
                if (rd !== date) return false;
            }
            if (shift && row['Shift'] !== shift) return false;
            return true;
        });
    }

    function renderTable(data) {
        const container = document.getElementById('reportContent');
        const countSpan = document.getElementById('filterCount');
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="no-data">📭 কোনো ডেটা নেই।</div>';
            countSpan.textContent = '(০টি)';
            return;
        }
        const headers = Object.keys(data[0]);
        let html = '<div class="table-wrapper"><table><thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';
        data.forEach(row => {
            html += '<tr>';
            headers.forEach(h => {
                let val = row[h] ?? '';
                if (typeof val === 'string' && val.length > 18) val = val.substring(0,16)+'…';
                html += `<td>${val}</td>`;
            });
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
        countSpan.textContent = `(${data.length}টি)`;
    }

    async function fetchAndRenderReport() {
        const data = await fetchAllData();
        if (data !== null) {
            const filtered = applyFilters(data);
            renderTable(filtered);
        }
    }

    document.getElementById('applyFilterBtn').addEventListener('click', function() {
        if (allReportData.length === 0) fetchAndRenderReport();
        else renderTable(applyFilters(allReportData));
    });

    document.getElementById('clearFilterBtn').addEventListener('click', function() {
        document.getElementById('filterDept').value = '';
        document.getElementById('filterDate').value = '';
        document.getElementById('filterShift').value = '';
        if (allReportData.length > 0) renderTable(allReportData);
        else fetchAndRenderReport();
    });

    document.getElementById('showReportBtn').addEventListener('click', async function() {
        document.getElementById('reportSection').style.display = 'block';
        this.style.display = 'none';
        document.getElementById('hideReportBtn').style.display = 'block';
        await fetchAndRenderReport();
    });

    document.getElementById('hideReportBtn').addEventListener('click', function() {
        document.getElementById('reportSection').style.display = 'none';
        this.style.display = 'none';
        document.getElementById('showReportBtn').style.display = 'block';
    });

    document.getElementById('refreshReportBtn').addEventListener('click', async function() {
        await fetchAndRenderReport();
    });

    document.getElementById('exportCsvBtn').addEventListener('click', function() {
        const table = document.querySelector('#reportContent table');
        if (!table) { alert('প্রথমে ডেটা লোড করুন।'); return; }
        let csv = '';
        const rows = table.querySelectorAll('tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('th, td');
            const data = [];
            cols.forEach(col => data.push('"' + col.innerText.replace(/"/g, '""') + '"'));
            csv += data.join(',') + '\n';
        });
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Admin_Report.csv';
        link.click();
        URL.revokeObjectURL(link.href);
    });

    // ---------- INIT ----------
    document.addEventListener('DOMContentLoaded', function() {
        populateDepartments();
        document.getElementById('entryDate').valueAsDate = new Date();
        toggleMcFields('');
        checkNetwork();
    });
</script>
