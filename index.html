<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রতিদিনের এন্ট্রি ফর্ম</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fc; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: red; border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 22px; line-height: 1.4; }
        .section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #007bff; }
        .section h3 { margin-top: 0; color: #333; }
        .row { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .row > div { flex: 1; min-width: 150px; }
        label { font-weight: bold; display: block; font-size: 13px; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        input:disabled { background: #e9ecef; color: #495057; }
        input:not([readonly])::placeholder { color: red; font-size: 12px; font-weight: bold; opacity: 1; }
        button { background: #28a745; color: white; border: none; padding: 14px; font-size: 18px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 25px; font-weight: bold; }
        button:hover { background: #218838; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .flex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .qty-placeholder { display: flex; align-items: center; justify-content: center; background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 8px; min-width: 150px; height: 70px; }
        .qty-placeholder span { color: #d32f2f; font-weight: bold; font-size: 14px; }
        .machine-box { background: #ffffff; border: 2px solid #0d47a1; border-radius: 12px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .machine-box .row { margin-top: 5px; }
        .machine-box label { color: #0d47a1; font-weight: 700; }
        .machine-box input:not([readonly]) { color: #d32f2f !important; font-weight: 700 !important; font-size: 16px; }
        .machine-box input[readonly] { color: #d32f2f !important; font-weight: 700 !important; font-size: 16px; background: #ffffff; }
        .machine-box input::placeholder { color: #d32f2f !important; font-weight: 700 !important; font-size: 12px; opacity: 0.7; }
        .container { max-height: 100vh; overflow-y: auto; }
        /* ডুপ্লিকেট মেসেজের জন্য রেড স্টাইল */
        .duplicate-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 প্রতিদিনের প্রতি শিফটের ম্যানপাওয়ার এলোকেশন এবং মেশিন রানিং মনিটরিং এর জন্য প্রয়োজনীয় এন্ট্রি ডাটা</h2>
    <form id="entryForm">

        <!-- মৌলিক তথ্য -->
        <div class="section">
            <h3>📅 মৌলিক তথ্য</h3>
            <div class="row">
                <div><label>তারিখ (Date)</label><input type="date" id="entryDate" required></div>
                <div><label>শিফট (Shift)</label>
                    <select id="shift"><option value="Day">Day</option><option value="Night">Night</option></select>
                </div>
                <div><label>ডিপার্টমেন্ট</label>
                    <select id="department" required>
                        <option value="">-- সিলেক্ট করুন --</option>
                    </select>
                </div>
                <div><label>আইসি নাম</label>
                    <input type="text" id="icName" placeholder="ডিপার্টমেন্ট সিলেক্ট করলে অটো আসবে" required>
                </div>
            </div>
        </div>

        <!-- ===== মেশিনের ডেটা (MC ডিপার্টমেন্টের জন্য) ===== -->
        <div class="section machine-box" id="mcDataSection">
            <h3>⚙️ মেশিনের ডেটা (অটো ক্যালকুলেশন)</h3>
            <div class="row">
                <div><label>Total MC</label>
                    <input type="number" id="totalMC" required placeholder="Typ QTY">
                </div>
                <div><label>Target MC Run (Running)</label>
                    <input type="number" id="mcRunning" required placeholder="Typ QTY" oninput="autoCalculate()">
                </div>
                <div><label>MC Will off (Stopped)</label>
                    <input type="number" id="mcStopped" required placeholder="Typ QTY" oninput="autoCalculate()">
                </div>
            </div>
            <div class="row">
                <div><label>MC Run %</label>
                    <input type="text" id="pctRunning" readonly style="background:#ffffff; color:#d32f2f; font-weight:700; font-size:16px;">
                </div>
                <div><label>MC Will off %</label>
                    <input type="text" id="pctStopped" readonly style="background:#ffffff; color:#d32f2f; font-weight:700; font-size:16px;">
                </div>
            </div>
        </div>

        <!-- ===== স্টপের কারণ (MC ডিপার্টমেন্টের জন্য) ===== -->
        <div class="section" id="causeSection">
            <h3>⛔ স্টপের কারণ (Cause of Stop - QTY)</h3>
            <div class="flex-grid">
                <div><label>MP Short</label><input type="number" id="mpShort" placeholder="Typ QTY"></div>
                <div><label>Mold Prob</label><input type="number" id="moldProblem" placeholder="Typ QTY"></div>
                <div><label>Mold Change</label><input type="number" id="moldChange" placeholder="Typ QTY"></div>
                <div><label>Sample</label><input type="number" id="underSample" placeholder="Typ QTY"></div>
                <div><label>MC prob</label><input type="number" id="mcProblem" placeholder="Typ QTY"></div>
                <div><label>Preventive</label><input type="number" id="preventiveMaintenance" placeholder="Typ QTY"></div>
                <div><label>No demand</label><input type="number" id="noDemandQty" placeholder="Typ QTY"></div>
                <div><label>Material short & MB</label><input type="number" id="materialMBShortage" placeholder="Typ QTY"></div>
                <div><label>Over Stock</label><input type="number" id="overStockWIP" placeholder="Typ QTY"></div>
                <div><label>Acc short</label><input type="number" id="accessoriesShort" placeholder="Typ QTY"></div>
            </div>
        </div>

        <!-- ===== এইচআর ও ম্যানপাওয়ার (সবার জন্য) ===== -->
        <div class="section" id="hrSection">
            <h3>👥 এইচআর ও ম্যানপাওয়ার</h3>
            <div class="row">
                <div><label>Total Present</label>
                    <input type="number" id="totalPresent" placeholder="Typ QTY" required>
                </div>
                <div><label>Leave</label>
                    <input type="number" id="leaveEmployee" placeholder="Typ QTY">
                </div>
                <div><label>Absent</label>
                    <input type="number" id="absentEmployee" placeholder="Typ QTY">
                </div>
            </div>
        </div>

        <!-- ===== মেশিন টাইপ (MC ডিপার্টমেন্টের জন্য) ===== -->
        <div class="section" id="machineTypeSection">
            <h3>🏭 মেশিন টাইপ (Machine Type)</h3>
            <div class="row">
                <div><label>Export MC</label><input type="number" id="exportMC" placeholder="Typ QTY"></div>
                <div><label>Domestic MC</label><input type="number" id="domesticMC" placeholder="Typ QTY"></div>
                <div><label>Single MC</label><input type="number" id="singleMC" placeholder="Typ QTY"></div>
                <div><label>Double MC</label><input type="number" id="doubleMC" placeholder="Typ QTY"></div>
                <div class="qty-placeholder">
                    <span>Typ QTY</span>
                </div>
            </div>
        </div>

        <!-- ===== অপারেটর ও স্টাফ (MC ডিপার্টমেন্টের জন্য) ===== -->
        <div class="section" id="operatorSection">
            <h3>👨‍🔧 অপারেটর ও স্টাফ</h3>
            <div class="flex-grid">
                <div><label>Prod IC</label><input type="number" id="prodIC" placeholder="Typ QTY"></div>
                <div><label>SIC</label><input type="number" id="sic" placeholder="Typ QTY"></div>
                <div><label>MC Operator</label><input type="number" id="mcOperator" placeholder="Typ QTY"></div>
                <div><label>Packaging Op</label><input type="number" id="packagingOperator" placeholder="Typ QTY"></div>
                <div><label>Foreman</label><input type="number" id="foreman" placeholder="Typ QTY"></div>
                <div><label>Senior Operator</label><input type="number" id="seniorOperator" placeholder="Typ QTY"></div>
                <div><label>Shrink-wrap Op</label><input type="number" id="shrinkOperator" placeholder="Typ QTY"></div>
                <div><label>Printing Op</label><input type="number" id="printingOperator" placeholder="Typ QTY"></div>
                <div><label>Mold Change Op</label><input type="number" id="moldChangeOperator" placeholder="Typ QTY"></div>
                <div><label>Mix/Recycle/Crush</label><input type="number" id="mixRecycle" placeholder="Typ QTY"></div>
                <div><label>Sub Store</label><input type="number" id="subStore" placeholder="Typ QTY"></div>
                <div><label>Inventory Op</label><input type="number" id="inventoryOperator" placeholder="Typ QTY"></div>
                <div><label>FG Delivery</label><input type="number" id="fgDelivery" placeholder="Typ QTY"></div>
                <div><label>Sharp Tools</label><input type="number" id="sharpTools" placeholder="Typ QTY"></div>
                <div><label>PSI</label><input type="number" id="psi" placeholder="Typ QTY"></div>
                <div><label>ERP</label><input type="number" id="erp" placeholder="Typ QTY"></div>
                <div><label>Floor Housekeeping</label><input type="number" id="floorHousekeeping" placeholder="Typ QTY"></div>
                <div><label>Rework</label><input type="number" id="rework" placeholder="Typ QTY"></div>
                <div><label>Welding</label><input type="number" id="welding" placeholder="Typ QTY"></div>
                <div><label>HR Transfer</label><input type="number" id="hrTransfer" placeholder="Typ QTY"></div>
            </div>
        </div>

        <button type="submit">💾 ডেটা সেভ করুন</button>
    </form>
    <div id="status"></div>
</div>

<script>
    // =============================================================
    // 🔥 আপনার Google Apps Script URL (একই URL GET ও POST এর জন্য)
    // =============================================================
    const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysydKnbUPM318FLov_121PBy--xvndahd5kecetHLnRboavCjWM-lkXtXgteK-WsXjQQ/exec';

    // ============================================================
    // ১. ডিপার্টমেন্ট অনুযায়ী আইসি নাম ম্যাপিং
    // ============================================================
    const DEPARTMENT_IC_MAP = {
        'RIP> DPL> Plastic-3': 'Mr. Shawon',
        'RIP> DPL> Plastic-6.1': 'Mr. Hazrat',
        'RIP> DPL> Plastic-6.2': 'Mr. Polash',
        'RIP> DPL> Plastic-7.1': 'Mr. Monir',
        'RIP> DPL> Plastic-7.2': 'Mr. Sayem',
        'RIP> DPL> Plastic-7.3': 'Mr. Saddam',
        'RIP> DPL> Plastic-7.4': 'Mr. Saddam',
        'RIP> DPL> Plastic-1': 'Mr. Atiqur Rahman',
        'Plastic Packaging-01': 'Mr. Mahbub',
        'Plastic Packaging-02': 'Mr. Rakib',
        'Plastic Packaging-03': 'Mr. Mahbub',
        'Plastic-Maintenance.': 'Mr. Rana',
        'Tool Room Maintenance': 'Mr. Kamal',
        'Plastic Inventory & Delivery': 'Mr. Hasan',
        'Corporate sales Production.': 'Mr. Tarek',
        'Plastics-Recycle & Silo': 'Mr. Shafiq',
        'Product Development & Mold Change': 'Mr. Sumon',
        'RIP-DPL-Factory Support': 'Mr. Jahir',
        'DPL-QA': 'Mr. Masud',
        'RIP RFL Store': 'Mr. Rahim'
    };

    // ============================================================
    // ২. ডিপার্টমেন্ট অনুযায়ী Total MC (Non-MC = 0)
    // ============================================================
    const DEPARTMENT_MC = {
        'RIP> DPL> Plastic-3': 61,
        'RIP> DPL> Plastic-6.1': 39,
        'RIP> DPL> Plastic-6.2': 59,
        'RIP> DPL> Plastic-7.1': 36,
        'RIP> DPL> Plastic-7.2': 76,
        'RIP> DPL> Plastic-7.3': 77,
        'RIP> DPL> Plastic-7.4': 35,
        'RIP> DPL> Plastic-1': 38,
        'Plastic Packaging-01': 0,
        'Plastic Packaging-02': 0,
        'Plastic Packaging-03': 0,
        'Plastic-Maintenance.': 0,
        'Tool Room Maintenance': 0,
        'Plastic Inventory & Delivery': 0,
        'Corporate sales Production.': 0,
        'Plastics-Recycle & Silo': 0,
        'Product Development & Mold Change': 0,
        'RIP-DPL-Factory Support': 0,
        'DPL-QA': 0,
        'RIP RFL Store': 0
    };

    // ============================================================
    // ৩. Non-MC ডিপার্টমেন্টের তালিকা (MC ফিল্ড লুকানোর জন্য)
    // ============================================================
    const NON_MC_DEPTS = [
        'Plastic Packaging-01', 'Plastic Packaging-02', 'Plastic Packaging-03',
        'Plastic-Maintenance.', 'Tool Room Maintenance', 'Plastic Inventory & Delivery',
        'Corporate sales Production.', 'Plastics-Recycle & Silo',
        'Product Development & Mold Change', 'RIP-DPL-Factory Support',
        'DPL-QA', 'RIP RFL Store'
    ];

    // ============================================================
    // ৪. ড্রপডাউনে ডিপার্টমেন্ট যোগ করা
    // ============================================================
    (function populateDepartments() {
        const select = document.getElementById('department');
        Object.keys(DEPARTMENT_IC_MAP).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = key;
            select.appendChild(opt);
        });
    })();

    // ============================================================
    // ৫. ডিপার্টমেন্ট চেঞ্জে আইসি নাম, টোটাল এমসি ও টগল
    // ============================================================
    function toggleMcFields(dept) {
        const isNonMC = NON_MC_DEPTS.includes(dept);
        document.getElementById('mcDataSection').style.display = isNonMC ? 'none' : 'block';
        document.getElementById('causeSection').style.display = isNonMC ? 'none' : 'block';
        document.getElementById('machineTypeSection').style.display = isNonMC ? 'none' : 'block';
        document.getElementById('operatorSection').style.display = isNonMC ? 'none' : 'block';
    }

    document.getElementById('department').addEventListener('change', function() {
        const dept = this.value;
        const icInput = document.getElementById('icName');
        const totalInput = document.getElementById('totalMC');

        icInput.value = DEPARTMENT_IC_MAP[dept] || '';

        if (dept in DEPARTMENT_MC) {
            const mcVal = DEPARTMENT_MC[dept];
            if (mcVal > 0) {
                totalInput.value = mcVal;
                totalInput.readOnly = true;
            } else {
                totalInput.value = '';
                totalInput.readOnly = false;
                totalInput.placeholder = 'Typ QTY';
            }
        } else {
            totalInput.value = '';
            totalInput.readOnly = false;
            totalInput.placeholder = 'Typ QTY';
        }

        toggleMcFields(dept);

        document.getElementById('mcRunning').value = '';
        document.getElementById('mcStopped').value = '';
        document.getElementById('pctRunning').value = '';
        document.getElementById('pctStopped').value = '';
    });

    // ============================================================
    // ৬. অটো ক্যালকুলেশন (MC Run % ও Will off %)
    // ============================================================
    function autoCalculate() {
        const total = parseInt(document.getElementById('totalMC').value) || 0;
        let running = parseInt(document.getElementById('mcRunning').value) || 0;
        let stopped = parseInt(document.getElementById('mcStopped').value) || 0;
        if (total === 0) {
            document.getElementById('pctRunning').value = '0%';
            document.getElementById('pctStopped').value = '0%';
            return;
        }
        const active = document.activeElement;
        const rInput = document.getElementById('mcRunning');
        const sInput = document.getElementById('mcStopped');
        if (active === rInput) {
            if (running > total) running = total;
            document.getElementById('mcRunning').value = running;
            stopped = total - running;
            document.getElementById('mcStopped').value = stopped;
        } else if (active === sInput) {
            if (stopped > total) stopped = total;
            document.getElementById('mcStopped').value = stopped;
            running = total - stopped;
            document.getElementById('mcRunning').value = running;
        } else {
            if (running + stopped !== total && (running > 0 || stopped > 0)) {
                if (running > 0 && running <= total) {
                    stopped = total - running;
                    document.getElementById('mcStopped').value = stopped;
                } else if (stopped > 0 && stopped <= total) {
                    running = total - stopped;
                    document.getElementById('mcRunning').value = running;
                }
            }
        }
        let pctR = 0, pctS = 0;
        if (total > 0) {
            pctR = (running / total) * 100;
            pctS = (stopped / total) * 100;
        }
        document.getElementById('pctRunning').value = pctR.toFixed(2) + '%';
        document.getElementById('pctStopped').value = pctS.toFixed(2) + '%';
    }

    // ============================================================
    // ৭. ডুপ্লিকেট চেক ফাংশন (GET রিকোয়েস্ট)
    // ============================================================
    async function checkDuplicate(date, shift, dept) {
        try {
            const response = await fetch(APP_SCRIPT_URL);
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            // ধরে নিচ্ছি data একটি array, প্রতিটি অবজেক্টে entryDate, shift, department ফিল্ড আছে
            if (!Array.isArray(data)) return false;
            return data.some(row => {
                const rowDate = row.entryDate || row.Date || '';
                // তারিখের ফরম্যাট মিলিয়ে নেওয়া (ধরি সব YYYY-MM-DD)
                const rowDateStr = rowDate.split('T')[0]; // যদি timestamp আসে
                return rowDateStr === date && row.Shift === shift && row.Department === dept;
            });
        } catch (error) {
            console.error('Duplicate check failed:', error);
            return false; // যদি চেক ফেইল করে, তাহলে সাবমিট হতে দেব না? বরং true ধরে নিয়ে সাবমিট বন্ধ করব?
            // বাস্তবে, নেটওয়ার্ক সমস্যা হলে আমরা সাবমিট করতে দিতে পারি, কিন্তু ব্যবহারকারীকে সতর্ক করতে পারি।
            // এখানে আমি false রিটার্ন করছি, মানে ডুপ্লিকেট নেই ধরে নিয়ে সাবমিট হবে।
            // কিন্তু ব্যবহারকারীকে জানানো ভালো যে চেক করা যায়নি।
            // আমি নিচে অল্টারনেটিভ ব্যবস্থা করছি।
        }
    }

    // ============================================================
    // ৮. ফর্ম সাবমিট (ডুপ্লিকেট চেক সহ)
    // ============================================================
    document.getElementById('entryDate').valueAsDate = new Date();

    window.addEventListener('DOMContentLoaded', function() {
        const dept = document.getElementById('department').value;
        toggleMcFields(dept);
    });

    document.getElementById('entryForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const status = document.getElementById('status');
        status.className = '';
        status.innerText = '⏳ চেক করা হচ্ছে...';

        const date = document.getElementById('entryDate').value;
        const shift = document.getElementById('shift').value;
        const dept = document.getElementById('department').value;

        // ১ম: ডুপ্লিকেট চেক
        try {
            const isDuplicate = await checkDuplicate(date, shift, dept);
            if (isDuplicate) {
                status.className = 'duplicate-error';
                status.innerHTML = '⚠️ <strong>আপনার ডিপার্টমেন্ট থেকে কেউ ইতিমধ্যেই এই তারিখ ও শিফটে এন্ট্রি জমা দিয়েছেন। দয়া করে চেক করুন।</strong>';
                return; // সাবমিট বন্ধ
            }
        } catch (error) {
            // যদি চেক ব্যর্থ হয়, তবুও আমরা সাবমিট করতে পারি, তবে ব্যবহারকারীকে জানাই
            status.className = 'warning';
            status.innerText = '⚠️ ডুপ্লিকেট চেক করা যায়নি, তবে আপনি সাবমিট করতে পারেন।';
            // এখানে আমরা থামছি না, বরং সাবমিট চালিয়ে যাচ্ছি
        }

        // ডুপ্লিকেট না থাকলে বা চেক ব্যর্থ হলেও সাবমিট
        status.innerText = '⏳ সেভ হচ্ছে...';
        const getVal = (id) => document.getElementById(id).value;
        const getNum = (id) => parseInt(document.getElementById(id).value) || 0;

        const payload = {
            entryDate: date,
            shift: shift,
            department: dept,
            icName: getVal('icName'),
            totalMC: getNum('totalMC'),
            mcRunning: getNum('mcRunning'),
            mcStopped: getNum('mcStopped'),
            pctRunning: getVal('pctRunning') || '0%',
            pctStopped: getVal('pctStopped') || '0%',
            prodHR: '0',
            targetCTN: '0',
            achievedCTN: '0',
            perHrCTN: '0',
            utilizationPct: '0%',
            mpShort: getNum('mpShort'),
            moldProblem: getNum('moldProblem'),
            moldChange: getNum('moldChange'),
            underSample: getNum('underSample'),
            mcProblem: getNum('mcProblem'),
            preventiveMaintenance: getNum('preventiveMaintenance'),
            noDemandQty: getNum('noDemandQty'),
            materialMBShortage: getNum('materialMBShortage'),
            overStockWIP: getNum('overStockWIP'),
            accessoriesShort: getNum('accessoriesShort'),
            totalPresent: getNum('totalPresent'),
            leaveEmployee: getNum('leaveEmployee'),
            absentEmployee: getNum('absentEmployee'),
            exportMC: getNum('exportMC'),
            domesticMC: getNum('domesticMC'),
            singleMC: getNum('singleMC'),
            doubleMC: getNum('doubleMC'),
            noDemand: '0',
            prodIC: getNum('prodIC'),
            sic: getNum('sic'),
            mcOperator: getNum('mcOperator'),
            packagingOperator: getNum('packagingOperator'),
            foreman: getNum('foreman'),
            seniorOperator: getNum('seniorOperator'),
            shrinkOperator: getNum('shrinkOperator'),
            printingOperator: getNum('printingOperator'),
            moldChangeOperator: getNum('moldChangeOperator'),
            mixRecycle: getNum('mixRecycle'),
            subStore: getNum('subStore'),
            inventoryOperator: getNum('inventoryOperator'),
            fgDelivery: getNum('fgDelivery'),
            sharpTools: getNum('sharpTools'),
            psi: getNum('psi'),
            erp: getNum('erp'),
            floorHousekeeping: getNum('floorHousekeeping'),
            rework: getNum('rework'),
            welding: getNum('welding'),
            hrTransfer: getNum('hrTransfer')
        };

        try {
            await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            status.className = 'success';
            status.innerText = '✅ ডেটা সফলভাবে জমা হয়েছে!';

            // ফিল্ড রিসেট (প্রয়োজনমতো)
            document.getElementById('mcRunning').value = '';
            document.getElementById('mcStopped').value = '';
            document.getElementById('pctRunning').value = '';
            document.getElementById('pctStopped').value = '';

            // 👉 এখানে ইমেইল পাঠানোর জন্য আলাদা কল করা যেতে পারে, তবে সেটা Apps Script-এ করা ভালো।
            // আপনি চাইলে পোস্টের পর একটি ইমেইল ট্রিগার করতে পারেন, কিন্তু তা Apps Script-এ করাই উত্তম।

        } catch (error) {
            status.className = 'error';
            status.innerText = '❌ সেভ করতে ব্যর্থ! নেটওয়ার্ক চেক করুন।';
            console.error('Error details:', error);
        }
    });
</script>
</body>
</html>
