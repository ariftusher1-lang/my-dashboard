<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শেয়ার্ড প্রোডাকশন ড্যাশবোর্ড</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif; }
        body { background:#f1f5f9; padding:20px; display:flex; justify-content:center; }
        .container { max-width:1600px; width:100%; background:white; padding:30px; border-radius:28px; box-shadow:0 20px 40px rgba(0,0,0,0.08); }
        h2 { color:#0f172a; border-left:6px solid #2563eb; padding-left:15px; margin-bottom:25px; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px 25px; }
        .form-group { display:flex; flex-direction:column; gap:4px; }
        .form-group label { font-weight:600; font-size:13px; color:#334155; }
        .form-group input, .form-group select { padding:8px 12px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; background:#fafcff; width:100%; }
        .form-group input:focus, .form-group select:focus { border-color:#2563eb; outline:none; box-shadow:0 0 0 4px rgba(37,99,235,0.1); }
        .form-group input[readonly] { background:#f1f5f9; font-weight:700; cursor:not-allowed; border-color:#d1d5db; }
        .calc-highlight { background:#f0fdf4 !important; border-color:#86efac !important; }
        .section-title { grid-column:1/-1; font-weight:700; font-size:18px; color:#0f172a; padding-top:10px; border-bottom:2px solid #e2e8f0; margin-bottom:5px; display:flex; align-items:center; gap:10px; }
        .section-title span { background:#2563eb; color:white; font-size:14px; padding:2px 12px; border-radius:30px; }
        .btn-group { grid-column:1/-1; display:flex; gap:15px; margin-top:15px; flex-wrap:wrap; }
        .btn { padding:12px 30px; border:none; border-radius:40px; font-weight:700; font-size:16px; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:8px; }
        .btn-primary { background:#2563eb; color:white; }
        .btn-primary:hover { background:#1d4ed8; transform:translateY(-2px); box-shadow:0 8px 20px rgba(37,99,235,0.3); }
        .btn-success { background:#16a34a; color:white; }
        .btn-success:hover { background:#15803d; transform:translateY(-2px); }
        .btn-danger { background:#dc2626; color:white; }
        .btn-danger:hover { background:#b91c1c; }
        .report-section { margin-top:40px; border-top:2px solid #e2e8f0; padding-top:25px; overflow-x:auto; }
        .report-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; }
        table { width:100%; border-collapse:collapse; font-size:12px; min-width:1800px; }
        th { background:#0f172a; color:white; padding:10px 5px; border:1px solid #1e293b; text-align:center; white-space:nowrap; font-size:11px; }
        td { padding:8px 5px; border:1px solid #e2e8f0; text-align:center; white-space:nowrap; }
        .badge { padding:2px 10px; border-radius:30px; font-weight:700; font-size:12px; }
        .bg-green { background:#dcfce7; color:#166534; }
        .bg-red { background:#fee2e2; color:#991b1b; }
        .bg-yellow { background:#fef9c3; color:#854d0e; }
        .loading { text-align:center; padding:30px; color:#2563eb; font-weight:600; }
        @media (max-width:768px) { .form-grid { grid-template-columns:1fr 1fr; } .container { padding:15px; } }
        @media (max-width:480px) { .form-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="container">
    <h2>🏭 শেয়ার্ড প্রোডাকশন মনিটর (সবাই একসাথে এন্ট্রি দিন)</h2>

    <form id="entryForm" class="form-grid">
        <!-- বেসিক ইনফো -->
        <div class="section-title"><span>📅</span> বেসিক ইনফো</div>
        <div class="form-group"><label>তারিখ (Date) <span style="color:red;">*</span></label><input type="date" id="entryDate" required></div>
        <div class="form-group"><label>শিফট (Shift) <span style="color:red;">*</span></label>
            <select id="shift" required><option value="">-- সিলেক্ট --</option><option value="Day">ডে (Day)</option><option value="Night">নাইট (Night)</option><option value="General">জেনারেল</option></select>
        </div>
        <div class="form-group"><label> </label></div>

        <!-- ডিপার্টমেন্ট -->
        <div class="section-title"><span>🏢</span> ডিপার্টমেন্ট (ফিক্সড)</div>
        <div class="form-group"><label>Department <span style="color:red;">*</span></label>
            <select id="department" required><option value="">-- সিলেক্ট করুন --</option></select>
        </div>
        <div class="form-group"><label>Prod IC (Auto)</label><input type="text" id="icName" readonly placeholder="অটো আসবে"></div>
        <div class="form-group"><label>Total MC (Fixed)</label><input type="number" id="totalMC" readonly class="calc-highlight"></div>

        <!-- অটো ক্যালকুলেশন -->
        <div class="section-title"><span>⚙️</span> মেশিন রান/স্টপ অটো</div>
        <div class="form-group"><label>MC Running (ম্যানুয়াল) <span style="color:red;">*</span></label><input type="number" id="mcRunning" placeholder="e.g. 10" step="1" min="0" required></div>
        <div class="form-group"><label>MC Stopped (অটো)</label><input type="number" id="mcStopped" readonly class="calc-highlight"></div>
        <div class="form-group"><label>% Running (অটো)</label><input type="text" id="pctRunning" readonly class="calc-highlight"></div>
        <div class="form-group"><label>% Stopped (অটো)</label><input type="text" id="pctStopped" readonly class="calc-highlight"></div>

        <!-- প্রোডাকশন -->
        <div class="section-title"><span>📊</span> প্রোডাকশন & এক্সপোর্ট/ডমেস্টিক</div>
        <div class="form-group"><label>Total HR</label><input type="number" id="totalHR" placeholder="e.g. 82"></div>
        <div class="form-group"><label>Export MC</label><input type="number" id="exportMC" placeholder="0"></div>
        <div class="form-group"><label>Domestic MC</label><input type="number" id="domesticMC" placeholder="0"></div>

        <!-- ম্যানপাওয়ার (২৮টি) -->
        <div class="section-title"><span>👷</span> ম্যানপাওয়ার (সব ম্যানুয়াল)</div>
        <div class="form-group"><label>Single MC</label><input type="number" id="singleMC" placeholder="0"></div>
        <div class="form-group"><label>Double MC</label><input type="number" id="doubleMC" placeholder="0"></div>
        <div class="form-group"><label>No Demand</label><input type="number" id="noDemand" placeholder="0"></div>
        <div class="form-group"><label>Prod IC</label><input type="number" id="prodIC" placeholder="0"></div>
        <div class="form-group"><label>SIC (M, TE, Shift IC)</label><input type="number" id="sic" placeholder="0"></div>
        <div class="form-group"><label>MC Operator</label><input type="number" id="mcOperator" placeholder="0"></div>
        <div class="form-group"><label>Packaging Operator</label><input type="number" id="packagingOperator" placeholder="0"></div>
        <div class="form-group"><label>Foreman</label><input type="number" id="foreman" placeholder="0"></div>
        <div class="form-group"><label>Senior Operator</label><input type="number" id="seniorOperator" placeholder="0"></div>
        <div class="form-group"><label>Shrink-wrap Op</label><input type="number" id="shrinkOperator" placeholder="0"></div>
        <div class="form-group"><label>Printing Op</label><input type="number" id="printingOperator" placeholder="0"></div>
        <div class="form-group"><label>Mold Change Op</label><input type="number" id="moldChangeOperator" placeholder="0"></div>
        <div class="form-group"><label>Mix/Recycle/Crush</label><input type="number" id="mixRecycle" placeholder="0"></div>
        <div class="form-group"><label>Sub Store</label><input type="number" id="subStore" placeholder="0"></div>
        <div class="form-group"><label>Inventory Op</label><input type="number" id="inventoryOperator" placeholder="0"></div>
        <div class="form-group"><label>FG Delivery</label><input type="number" id="fgDelivery" placeholder="0"></div>
        <div class="form-group"><label>Sharp Tools</label><input type="number" id="sharpTools" placeholder="0"></div>
        <div class="form-group"><label>PSI</label><input type="number" id="psi" placeholder="0"></div>
        <div class="form-group"><label>ERP</label><input type="number" id="erp" placeholder="0"></div>
        <div class="form-group"><label>Floor Housekeeping</label><input type="number" id="floorHousekeeping" placeholder="0"></div>
        <div class="form-group"><label>Rework</label><input type="number" id="rework" placeholder="0"></div>
        <div class="form-group"><label>Welding</label><input type="number" id="welding" placeholder="0"></div>
        <div class="form-group"><label>HR Transfer</label><input type="number" id="hrTransfer" placeholder="0"></div>
        <div class="form-group"><label> </label></div>

        <div class="btn-group">
            <button type="button" class="btn btn-primary" id="addBtn">➕ এন্ট্রি যোগ করুন (শেয়ার)</button>
            <button type="reset" class="btn btn-danger" id="resetBtn">🗑️ ফর্ম রিসেট</button>
        </div>
    </form>

    <div class="report-section">
        <div class="report-header">
            <h3>📋 সবার এন্ট্রির রিপোর্ট (লাইভ)</h3>
            <button class="btn btn-success" id="exportExcelBtn">⬇️ Excel ডাউনলোড করুন</button>
        </div>
        <div id="loadingMessage" class="loading">⏳ ডেটা লোড হচ্ছে...</div>
        <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
            <table id="reportTable">
                <thead id="reportHead"></thead>
                <tbody id="reportBody"></tbody>
            </table>
        </div>
        <p style="text-align:right; color:#64748b; font-size:13px; margin-top:8px;">মোট এন্ট্রি: <span id="entryCount">0</span></p>
    </div>
</div>

<script>
    // ============================================================
    // 🔴 IMPORTANT: আপডেটেড Apps Script Web App URL
    // ============================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAV6ZZuC035aPLOtMzLMlTnT7vrd8Hf6dZcE2UUnh4B_EQiTMWWWFtfRXXwHs71cBnWA/exec';

    // ============================================================
    // ফিক্সড ডিপার্টমেন্ট ম্যাপ (আপনার দেওয়া তালিকা)
    // ============================================================
    const deptMap = {
        'Plastic Prod-01': { ic: 'Mr. Atikur', totalMC: 38 },
        'Plastic Prod-3.1': { ic: 'Mr.Shawan', totalMC: 61 },
        'Plastic Prod-6.1': { ic: 'Mr. Hazrat', totalMC: 39 },
        'Plastic Prod-6.2': { ic: 'Mr. Polash', totalMC: 59 },
        'Plastic Prod-7.1': { ic: 'Mr. Manir', totalMC: 36 },
        'Plastic Prod-7.2': { ic: 'Mr. Sayem', totalMC: 76 },
        'Plastic Prod-7.3': { ic: 'Mr. Saddam', totalMC: 77 },
        'Plastic Prod-7.4': { ic: 'Mr. Saddam', totalMC: 35 },
        'Silicon Project': { ic: 'Mr. Mamun', totalMC: 9 },
        'Packaging -01': { ic: 'Mr. Mahbub', totalMC: 0 },
        // ✅ Packaging -02 তে বসের নাম বসিয়ে দেওয়া হলো
        'Packaging -02': { ic: 'Mr. Rakib', totalMC: 0 },
        'Packaging -03': { ic: 'Mr. Mahbub', totalMC: 0 },
        'Plastic-Maintenance.': { ic: 'Mr. Maruf', totalMC: 0 },
        'Tool Room Maintenance': { ic: 'Mr. Jabed', totalMC: 0 },
        'Plastic Inventory & Delivery': { ic: 'Mr. Faysal', totalMC: 0 },
        'Corporate sales Production.': { ic: 'Mr. Atikur', totalMC: 0 },
        'Plastics-Recycle & Silo': { ic: 'Mr. Asim', totalMC: 0 },
        'Product Development & Mold Change': { ic: 'Mr. Dibakor', totalMC: 0 },
        'RIP-DPL-Factory Support': { ic: 'Mr. Zahid', totalMC: 0 },
        'DPL-QA': { ic: 'Mr. Jabed', totalMC: 0 },
        'RIP RFL Store': { ic: 'Mr. Mithun', totalMC: 0 }
    };

    // ড্রপডাউনে ডিপার্টমেন্ট লোড
    const deptSelect = document.getElementById('department');
    Object.keys(deptMap).forEach(dept => {
        const opt = document.createElement('option');
        opt.value = dept;
        opt.textContent = dept;
        deptSelect.appendChild(opt);
    });

    // এলিমেন্ট রেফারেন্স
    const icInput = document.getElementById('icName');
    const totalMCInput = document.getElementById('totalMC');
    const mcRunning = document.getElementById('mcRunning');
    const mcStopped = document.getElementById('mcStopped');
    const pctRunning = document.getElementById('pctRunning');
    const pctStopped = document.getElementById('pctStopped');

    // ডিপার্টমেন্ট পরিবর্তনে IC ও Total MC সেট
    deptSelect.addEventListener('change', function() {
        const val = this.value;
        if (val && deptMap[val]) {
            icInput.value = deptMap[val].ic;
            totalMCInput.value = deptMap[val].totalMC;
        } else {
            icInput.value = '';
            totalMCInput.value = '';
        }
        calculateMachineStats();
    });

    // অটো ক্যালকুলেশন (Total MC 0 হলে 0% দেখাবে)
    function calculateMachineStats() {
        const total = parseFloat(totalMCInput.value) || 0;
        const running = parseFloat(mcRunning.value) || 0;
        let stopped = total - running;
        if (stopped < 0) stopped = 0;
        mcStopped.value = stopped;
        
        if (total > 0) {
            pctRunning.value = ((running / total) * 100).toFixed(1) + '%';
            pctStopped.value = ((stopped / total) * 100).toFixed(1) + '%';
        } else {
            // Total MC 0 হলে শতাংশ 0% দেখাবে
            pctRunning.value = '0%';
            pctStopped.value = '0%';
        }
    }
    totalMCInput.addEventListener('change', calculateMachineStats);
    mcRunning.addEventListener('input', calculateMachineStats);

    // ============================================================
    //  ডেটা লোড করা (GET)
    // ============================================================
    async function loadAllData() {
        const tbody = document.getElementById('reportBody');
        const thead = document.getElementById('reportHead');
        const loading = document.getElementById('loadingMessage');
        loading.style.display = 'block';

        try {
            const response = await fetch(SCRIPT_URL);
            const result = await response.json();
            loading.style.display = 'none';

            if (result.error) {
                alert('ডেটা লোডে সমস্যা: ' + result.error);
                return;
            }

            const data = result.data || [];
            document.getElementById('entryCount').innerText = data.length;

            // হেডার তৈরি
            if (data.length > 0 && thead.children.length === 0) {
                const headers = ['SL', 'Date', 'Shift', 'Dept', 'IC', 'Total MC', 'Run', 'Stop', '% Run', '% Stop',
                    'Total HR', 'Exp MC', 'Dom MC', 'Single', 'Double', 'No Demand', 'Prod IC', 'SIC',
                    'MC Op', 'Pack Op', 'Foreman', 'Senior Op', 'Shrink', 'Print', 'Mold Change',
                    'Mix/Rec', 'Sub Store', 'Inv Op', 'FG Del', 'Sharp', 'PSI', 'ERP',
                    'Floor HK', 'Rework', 'Welding', 'HR Trans'
                ];
                let hhtml = '<tr>';
                headers.forEach(h => hhtml += `<th>${h}</th>`);
                hhtml += '</tr>';
                thead.innerHTML = hhtml;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="36" style="text-align:center; padding:30px; color:#94a3b8;">📭 এখনো কোনো ডেটা নেই।</td></tr>`;
                return;
            }

            let html = '';
            data.forEach((row, idx) => {
                let runPct = parseFloat(row.pctRunning);
                let badge = '';
                if (runPct >= 80) badge = `<span class="badge bg-green">${row.pctRunning}</span>`;
                else if (runPct >= 50) badge = `<span class="badge bg-yellow">${row.pctRunning}</span>`;
                else badge = `<span class="badge bg-red">${row.pctRunning}</span>`;

                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${row.entryDate || ''}</td>
                    <td>${row.shift || ''}</td>
                    <td>${row.department || ''}</td>
                    <td>${row.icName || ''}</td>
                    <td>${row.totalMC || 0}</td>
                    <td>${row.mcRunning || 0}</td>
                    <td>${row.mcStopped || 0}</td>
                    <td>${badge}</td>
                    <td>${row.pctStopped || '0%'}</td>
                    <td>${row.totalHR || 0}</td>
                    <td>${row.exportMC || 0}</td>
                    <td>${row.domesticMC || 0}</td>
                    <td>${row.singleMC || 0}</td>
                    <td>${row.doubleMC || 0}</td>
                    <td>${row.noDemand || 0}</td>
                    <td>${row.prodIC || 0}</td>
                    <td>${row.sic || 0}</td>
                    <td>${row.mcOperator || 0}</td>
                    <td>${row.packagingOperator || 0}</td>
                    <td>${row.foreman || 0}</td>
                    <td>${row.seniorOperator || 0}</td>
                    <td>${row.shrinkOperator || 0}</td>
                    <td>${row.printingOperator || 0}</td>
                    <td>${row.moldChangeOperator || 0}</td>
                    <td>${row.mixRecycle || 0}</td>
                    <td>${row.subStore || 0}</td>
                    <td>${row.inventoryOperator || 0}</td>
                    <td>${row.fgDelivery || 0}</td>
                    <td>${row.sharpTools || 0}</td>
                    <td>${row.psi || 0}</td>
                    <td>${row.erp || 0}</td>
                    <td>${row.floorHousekeeping || 0}</td>
                    <td>${row.rework || 0}</td>
                    <td>${row.welding || 0}</td>
                    <td>${row.hrTransfer || 0}</td>
                </tr>`;
            });
            tbody.innerHTML = html;

        } catch (err) {
            loading.style.display = 'none';
            alert('সার্ভারে কানেক্ট করতে পারেনি। ইন্টারনেট চেক করুন বা URL ঠিক আছে কিনা দেখুন।');
            console.error(err);
        }
    }

    // ============================================================
    //  নতুন ডেটা জমা দেওয়া (POST) - Total MC 0 হলেও চলবে
    // ============================================================
    async function addEntry() {
        const data = {
            entryDate: document.getElementById('entryDate').value,
            shift: document.getElementById('shift').value,
            department: deptSelect.value,
            icName: icInput.value,
            totalMC: parseFloat(totalMCInput.value) || 0,
            mcRunning: parseFloat(mcRunning.value) || 0,
            mcStopped: parseFloat(mcStopped.value) || 0,
            pctRunning: pctRunning.value || '0%',
            pctStopped: pctStopped.value || '0%',
            totalHR: parseFloat(document.getElementById('totalHR').value) || 0,
            exportMC: parseFloat(document.getElementById('exportMC').value) || 0,
            domesticMC: parseFloat(document.getElementById('domesticMC').value) || 0,
            singleMC: parseFloat(document.getElementById('singleMC').value) || 0,
            doubleMC: parseFloat(document.getElementById('doubleMC').value) || 0,
            noDemand: parseFloat(document.getElementById('noDemand').value) || 0,
            prodIC: parseFloat(document.getElementById('prodIC').value) || 0,
            sic: parseFloat(document.getElementById('sic').value) || 0,
            mcOperator: parseFloat(document.getElementById('mcOperator').value) || 0,
            packagingOperator: parseFloat(document.getElementById('packagingOperator').value) || 0,
            foreman: parseFloat(document.getElementById('foreman').value) || 0,
            seniorOperator: parseFloat(document.getElementById('seniorOperator').value) || 0,
            shrinkOperator: parseFloat(document.getElementById('shrinkOperator').value) || 0,
            printingOperator: parseFloat(document.getElementById('printingOperator').value) || 0,
            moldChangeOperator: parseFloat(document.getElementById('moldChangeOperator').value) || 0,
            mixRecycle: parseFloat(document.getElementById('mixRecycle').value) || 0,
            subStore: parseFloat(document.getElementById('subStore').value) || 0,
            inventoryOperator: parseFloat(document.getElementById('inventoryOperator').value) || 0,
            fgDelivery: parseFloat(document.getElementById('fgDelivery').value) || 0,
            sharpTools: parseFloat(document.getElementById('sharpTools').value) || 0,
            psi: parseFloat(document.getElementById('psi').value) || 0,
            erp: parseFloat(document.getElementById('erp').value) || 0,
            floorHousekeeping: parseFloat(document.getElementById('floorHousekeeping').value) || 0,
            rework: parseFloat(document.getElementById('rework').value) || 0,
            welding: parseFloat(document.getElementById('welding').value) || 0,
            hrTransfer: parseFloat(document.getElementById('hrTransfer').value) || 0
        };

        // ভ্যালিডেশন (শুধু Date, Shift, Department চেক করা হচ্ছে, Total MC 0 হলেও চলবে)
        if (!data.entryDate) { alert('দয়া করে তারিখ (Date) সিলেক্ট করুন!'); return; }
        if (!data.shift) { alert('দয়া করে শিফট (Shift) সিলেক্ট করুন!'); return; }
        if (!data.department) { alert('দয়া করে ডিপার্টমেন্ট সিলেক্ট করুন!'); return; }

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.textContent = '⏳ জমা হচ্ছে...';

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            alert('✅ ডেটা সফলভাবে জমা হয়েছে! রিপোর্ট রিফ্রেশ হচ্ছে...');
            clearForm();
            await loadAllData();

        } catch (err) {
            alert('❌ জমা দিতে সমস্যা হয়েছে। ইন্টারনেট কানেকশন চেক করুন।');
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.textContent = '➕ এন্ট্রি যোগ করুন (শেয়ার)';
        }
    }

    function clearForm() {
        document.getElementById('entryForm').reset();
        mcStopped.value = '';
        pctRunning.value = '0%';
        pctStopped.value = '0%';
        icInput.value = '';
        totalMCInput.value = '';
        document.querySelectorAll('#entryForm input[type="number"]').forEach(inp => {
            if (inp.id !== 'totalMC' && inp.id !== 'mcRunning' && inp.id !== 'mcStopped') {
                inp.value = '';
            }
        });
        deptSelect.dispatchEvent(new Event('change'));
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('entryDate').value = today;
    }

    // ============================================================
    //  এক্সেল ডাউনলোড (টেবিল থেকে)
    // ============================================================
    function exportToExcel() {
        const table = document.getElementById('reportTable');
        if (table.rows.length <= 1) {
            alert('রিপোর্ট খালি! প্রথমে কিছু ডেটা যোগ করুন।');
            return;
        }
        const wb = XLSX.utils.table_to_book(table, { sheet: "Report" });
        XLSX.writeFile(wb, `Shared_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // ============================================================
    //  ইভেন্ট লিসেনার
    // ============================================================
    document.getElementById('addBtn').addEventListener('click', addEntry);
    document.getElementById('exportExcelBtn').addEventListener('click', exportToExcel);
    document.getElementById('resetBtn').addEventListener('click', function(e) {
        e.preventDefault();
        if (confirm('ফর্ম রিসেট করবেন? (রিপোর্ট ডেটা থাকবে)')) {
            clearForm();
        }
    });

    // পেজ লোড হলে আজকের তারিখ সেট ও ডেটা লোড
    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('entryDate').value = today;
        loadAllData();
        calculateMachineStats();
    };
</script>
</body>
</html>
